stead of becoming separate features\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Planning\u003c/td>\u003ctd>Define 2-3 props: bed, toy, food/snack; define effects on mood/energy/affection/hunger\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Client\u003c/td>\u003ctd>Implement prop placement/runtime, click interactions, chat bubble UI, and \u003ccode>Talking\u003c/code> state\u003c/td>\u003c/tr>\u003ctr>\u003ctd>AI\u003c/td>\u003ctd>Implement local chat bridge or mockable adapter, bilingual persona prompt, timeout, cancel, and fallback replies\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art\u003c/td>\u003ctd>Provide prop sprites and seal reaction requirements for eating, playing, sleeping, and talking\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Release\u003c/td>\u003ctd>Test offline behavior, model-missing behavior, CPU/memory impact, and log failures clearly\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QA\u003c/td>\u003ctd>Run M5 QA checklist, verify prop reactions, chat/fallback behavior, offline behavior, timeout recovery, and runtime stability\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Exit checklist:\u003c/p>\n\u003cul>\n\u003cli>Bed, toy, and food/snack trigger visible seal reactions.\u003c/li>\n\u003cli>Chat UI can produce a short bilingual character response or fallback.\u003c/li>\n\u003cli>AI failure never breaks the pet runtime.\u003c/li>\n\u003cli>Offline mode is cleanly supported.\u003c/li>\n\u003c/ul>\n\u003ch3>M6: Steam Candidate\u003c/h3>\n\u003cp>Goal: Turn the prototype into a distributable MVP candidate.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Role\u003c/th>\u003cth>Responsibilities\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Owner\u003c/td>\u003ctd>Final MVP acceptance review and cut any feature that threatens stability\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Planning\u003c/td>\u003ctd>Write first-run flow, settings labels, bilingual text list, and final feature checklist\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Client\u003c/td>\u003ctd>Implement settings panel, language toggle, volume/animation/always-on-top controls, and build fixes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>AI\u003c/td>\u003ctd>Freeze model strategy for MVP: bundled small model, optional local pack, or fallback-only\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art\u003c/td>\u003ctd>Deliver app icon, first Steam visual drafts, screenshots, and short trailer capture plan\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Release\u003c/td>\u003ctd>Create Windows package, run smoke tests, verify clean install, offline launch, save migration, and Steam folder launch\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QA\u003c/td>\u003ctd>Run M6 QA checklist, verify packaged launch, offline mode, save/settings persistence, idle soak, known issues, and owner-facing release recommendation\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Exit checklist:\u003c/p>\n\u003cul>\n\u003cli>Windows build launches without dev tooling.\u003c/li>\n\u003cli>App works offline.\u003c/li>\n\u003cli>Settings and saves persist.\u003c/li>\n\u003cli>Two-hour idle test passes.\u003c/li>\n\u003cli>Store screenshots/trailer capture are possible.\u003c/li>\n\u003cli>Known issues and release cuts are documented.\u003c/li>\n\u003c/ul>\n\u003ch3>Cross-Milestone Rules\u003c/h3>\n\u003cul>\n\u003cli>Every milestone must end with a runnable build or verified document, not only discussion.\u003c/li>\n\u003cli>Every milestone must receive a QA Tester report before owner acceptance.\u003c/li>\n\u003cli>AI features must always have deterministic fallback behavior.\u003c/li>\n\u003cli>Art scope is cut by animation count first, not by default seal quality.\u003c/li>\n\u003cli>The app must always have a clear exit path from tray/menu.\u003c/li>\n\u003cli>Bilingual text should go through a central text table once UI text begins to grow.\u003c/li>\n\u003c/ul>"},{"file":"docs/project-plan/milestone-qa-checklists.md","exists":true,"updatedAt":"2026-07-05T15:21:39.156Z","html":"\u003ch2>Milestone QA Checklists\u003c/h2>\n\u003ch3>How To Use This Document\u003c/h3>\n\u003cp>Use this as the owner-side QA checklist before accepting each milestone. A milestone should not be accepted if any required check fails.\u003c/p>\n\u003cp>From M2 onward, each milestone follows this gate:\u003c/p>\n\u003cp>1. Implementation is marked ready.\u003c/p>\n\u003cp>2. QA Tester runs the relevant checklist.\u003c/p>\n\u003cp>3. QA Tester reports pass/fail status and reproduction steps.\u003c/p>\n\u003cp>4. Owner performs final acceptance.\u003c/p>\n\u003cp>QA Tester should mark hardware-dependent checks as &quot;owner confirmation required&quot; when the subagent cannot directly observe the user's machine, monitors, or input devices.\u003c/p>\n\u003cp>Severity guide:\u003c/p>\n\u003cul>\n\u003cli>Blocker: must be fixed before accepting the milestone.\u003c/li>\n\u003cli>Major: should be fixed unless explicitly deferred by owner.\u003c/li>\n\u003cli>Minor: can be accepted and tracked for later.\u003c/li>\n\u003c/ul>\n\u003ch3>M0: Product Lock QA\u003c/h3>\n\u003cp>Goal: Confirm the team is aligned before implementation.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>How To Verify\u003c/th>\u003cth>Pass Criteria\u003c/th>\u003cth>Severity\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Product name locked\u003c/td>\u003ctd>Open \u003ccode>docs/project-plan/product-inputs.md\u003c/code>\u003c/td>\u003ctd>Project name is \u003ccode>Project Seal\u003c/code>\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Default pet locked\u003c/td>\u003ctd>Open product inputs and M0 product lock\u003c/td>\u003ctd>Default pet is white baby seal\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Platform locked\u003c/td>\u003ctd>Open M0 product lock\u003c/td>\u003ctd>Windows-first and Steam offline are stated\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Price locked\u003c/td>\u003ctd>Open product inputs\u003c/td>\u003ctd>Target price is about USD 1\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Language scope locked\u003c/td>\u003ctd>Open product inputs\u003c/td>\u003ctd>First release is bilingual\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>MVP non-goals listed\u003c/td>\u003ctd>Open \u003ccode>docs/project-plan/m0-product-lock.md\u003c/code>\u003c/td>\u003ctd>Workshop, online accounts, cloud, complex AI, and non-Windows are excluded\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Toolchain works\u003c/td>\u003ctd>Run \u003ccode>node --version\u003c/code>, \u003ccode>npm.cmd --version\u003c/code>, \u003ccode>git --version\u003c/code>\u003c/td>\u003ctd>All commands return versions\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Project compiles\u003c/td>\u003ctd>Run \u003ccode>npm.cmd run typecheck\u003c/code>\u003c/td>\u003ctd>Typecheck passes\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Git exists\u003c/td>\u003ctd>Run \u003ccode>git status --short\u003c/code>\u003c/td>\u003ctd>Command works without repository error\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Accept M0 when:\u003c/p>\n\u003cul>\n\u003cli>All blocker checks pass.\u003c/li>\n\u003cli>Any missing art/reference material is documented as non-blocking for M1.\u003c/li>\n\u003c/ul>\n\u003ch3>M1: Desktop Shell Prototype QA\u003c/h3>\n\u003cp>Goal: Confirm Project Seal can exist safely as a desktop pet shell.\u003c/p>\n\u003cp>Run:\u003c/p>\n\u003cpre>\u003ccode>cd &quot;C:\\Users\\ASUS\\Desktop\\Project Seal&quot;\nnpm.cmd run dev\u003c/code>\u003c/pre>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>How To Verify\u003c/th>\u003cth>Pass Criteria\u003c/th>\u003cth>Severity\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Launch\u003c/td>\u003ctd>Run dev command\u003c/td>\u003ctd>App starts without terminal error\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Window appears\u003c/td>\u003ctd>Look at desktop after launch\u003c/td>\u003ctd>Seal placeholder is visible or can be shown from tray\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Transparency\u003c/td>\u003ctd>Look behind the seal\u003c/td>\u003ctd>No opaque rectangular app background\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Always-on-top\u003c/td>\u003ctd>Put another normal window under/over it\u003c/td>\u003ctd>Seal remains above normal windows\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Drag\u003c/td>\u003ctd>Drag the seal area\u003c/td>\u003ctd>Pet window moves\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Tray icon exists\u003c/td>\u003ctd>Check system tray\u003c/td>\u003ctd>Project Seal tray icon/menu is present\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Show/hide\u003c/td>\u003ctd>Use tray menu\u003c/td>\u003ctd>Hide removes pet; Show restores it\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Exit\u003c/td>\u003ctd>Use tray menu Exit\u003c/td>\u003ctd>App fully exits and terminal/dev process ends or can be stopped cleanly\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Close behavior\u003c/td>\u003ctd>Click window close if visible through OS control path\u003c/td>\u003ctd>App hides or exits safely; no lost process\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Placeholder readability\u003c/td>\u003ctd>Inspect at normal desktop size\u003c/td>\u003ctd>It reads as a white baby seal direction\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Build health\u003c/td>\u003ctd>Run \u003ccode>npm.cmd run build\u003c/code>\u003c/td>\u003ctd>Build passes\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Acceptable in M1:\u003c/p>\n\u003cul>\n\u003cli>No click reaction.\u003c/li>\n\u003cli>No state machine.\u003c/li>\n\u003cli>No final art.\u003c/li>\n\u003cli>No settings panel.\u003c/li>\n\u003cli>No saved position.\u003c/li>\n\u003cli>No Steam package.\u003c/li>\n\u003c/ul>\n\u003cp>Reject M1 if:\u003c/p>\n\u003cul>\n\u003cli>The app does not launch.\u003c/li>\n\u003cli>The pet cannot be moved.\u003c/li>\n\u003cli>The tray cannot exit the app.\u003c/li>\n\u003cli>The window is opaque or visually blocks desktop use.\u003c/li>\n\u003c/ul>\n\u003ch3>M2: Pet Runtime QA\u003c/h3>\n\u003cp>Goal: Confirm the seal behaves like a living desktop pet.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>How To Verify\u003c/th>\u003cth>Pass Criteria\u003c/th>\u003cth>Severity\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Idle state\u003c/td>\u003ctd>Launch and wait\u003c/td>\u003ctd>Seal idles without freezing\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Walk/move state\u003c/td>\u003ctd>Wait for auto behavior or trigger move\u003c/td>\u003ctd>Seal visibly changes position or animation state\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Sleep state\u003c/td>\u003ctd>Trigger low energy or wait for inactivity\u003c/td>\u003ctd>Seal enters sleep and can wake\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Dragged state\u003c/td>\u003ctd>Drag seal\u003c/td>\u003ctd>Drag state overrides other states cleanly\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Poke/click reaction\u003c/td>\u003ctd>Click or poke seal\u003c/td>\u003ctd>Seal visibly reacts\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Happy/annoyed reactions\u003c/td>\u003ctd>Repeat positive and repeated click interactions\u003c/td>\u003ctd>Reactions differ and feel readable\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>State priority\u003c/td>\u003ctd>Drag while another action is active\u003c/td>\u003ctd>High-priority state wins and returns safely\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>No stuck states\u003c/td>\u003ctd>Interact repeatedly for 5 minutes\u003c/td>\u003ctd>Seal never freezes in invalid animation/state\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Basic values\u003c/td>\u003ctd>Inspect UI/debug display/save if available\u003c/td>\u003ctd>Mood/energy/affection/hunger update as designed\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Position persistence\u003c/td>\u003ctd>Move pet, restart app\u003c/td>\u003ctd>Pet position is restored or documented if deferred\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Mixed-resolution multi-monitor\u003c/td>\u003ctd>Drag pet between monitors with different resolutions/scaling, then restart on the secondary monitor\u003c/td>\u003ctd>Pet remains visible, draggable, correctly transparent, and does not reopen off-screen\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Idle performance\u003c/td>\u003ctd>Leave app running 15 minutes\u003c/td>\u003ctd>No obvious CPU/GPU spike, no memory runaway\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Acceptable in M2:\u003c/p>\n\u003cul>\n\u003cli>Placeholder art can still be used.\u003c/li>\n\u003cli>AI/chat can remain stubbed.\u003c/li>\n\u003cli>Scene props can be absent.\u003c/li>\n\u003c/ul>\n\u003cp>Reject M2 if:\u003c/p>\n\u003cul>\n\u003cli>State machine gets stuck.\u003c/li>\n\u003cli>Drag/poke breaks the app.\u003c/li>\n\u003cli>Pet behavior feels uncontrollable or disruptive.\u003c/li>\n\u003cli>Cross-monitor movement makes the pet disappear, become unclickable, or reopen off-screen.\u003c/li>\n\u003c/ul>\n\u003ch3>M3: Character Pack + Seal Art Pass QA\u003c/h3>\n\u003cp>Goal: Confirm the default seal and character packs are data-driven.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>How To Verify\u003c/th>\u003cth>Pass Criteria\u003c/th>\u003cth>Severity\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Manifest loading\u003c/td>\u003ctd>Launch with default character manifest\u003c/td>\u003ctd>Default seal loads from manifest\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Missing animation fallback\u003c/td>\u003ctd>Temporarily remove or rename optional animation in test pack\u003c/td>\u003ctd>App falls back without crash\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character swap\u003c/td>\u003ctd>Add/select a second test pack\u003c/td>\u003ctd>Character can change without code edits\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Seal readability\u003c/td>\u003ctd>View on light and dark backgrounds\u003c/td>\u003ctd>White seal remains visible and cute\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pixel scaling\u003c/td>\u003ctd>Inspect at common desktop scaling\u003c/td>\u003ctd>Pixel art remains crisp, not blurry\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Animation naming\u003c/td>\u003ctd>Compare art files to manifest\u003c/td>\u003ctd>Names match documented schema\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art source tracking\u003c/td>\u003ctd>Check asset folder\u003c/td>\u003ctd>Source/metadata exists for official art\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Bilingual personality metadata\u003c/td>\u003ctd>Inspect manifest\u003c/td>\u003ctd>Character has fields for bilingual tone/replies\u003c/td>\u003ctd>Minor\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Acceptable in M3:\u003c/p>\n\u003cul>\n\u003cli>Replacement skins can be rough.\u003c/li>\n\u003cli>Not all 12 animation actions need final polish if core actions work.\u003c/li>\n\u003c/ul>\n\u003cp>Reject M3 if:\u003c/p>\n\u003cul>\n\u003cli>A bad/missing asset crashes the app.\u003c/li>\n\u003cli>The default seal does not read as a white baby seal.\u003c/li>\n\u003cli>Adding a character requires code changes.\u003c/li>\n\u003c/ul>\n\u003ch3>M4: Photo-To-Pixel Customization QA\u003c/h3>\n\u003cp>Goal: Confirm the customization hook works locally and safely.\u003c/p>\n\u003cp>Prepare:\u003c/p>\n\u003cul>\n\u003cli>3-5 test images in \u003ccode>assets/references/photo-to-pixel-tests/\u003c/code>.\u003c/li>\n\u003c/ul>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>How To Verify\u003c/th>\u003cth>Pass Criteria\u003c/th>\u003cth>Severity\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Import image\u003c/td>\u003ctd>Use supported image formats\u003c/td>\u003ctd>Image loads without crash\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Template generation\u003c/td>\u003ctd>Import image and preview result\u003c/td>\u003ctd>Output uses the built-in Q-version pixel character template\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Photo influence\u003c/td>\u003ctd>Compare several different photos\u003c/td>\u003ctd>Output palette/accent changes based on input, without becoming a raw photo crop\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Palette limit\u003c/td>\u003ctd>Inspect output\u003c/td>\u003ctd>Colors are controlled and not noisy\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Save custom result\u003c/td>\u003ctd>Save generated character\u003c/td>\u003ctd>Result appears in selectable custom list\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Select custom result\u003c/td>\u003ctd>Apply saved result\u003c/td>\u003ctd>Pet uses the generated template character\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Bad image handling\u003c/td>\u003ctd>Try tiny/huge/invalid image\u003c/td>\u003ctd>App gives graceful error, no crash\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local privacy\u003c/td>\u003ctd>Disconnect network or inspect flow\u003c/td>\u003ctd>Image processing does not require upload\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Repeat generation\u003c/td>\u003ctd>Generate several times\u003c/td>\u003ctd>No stale preview or overwritten wrong file\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Acceptable in M4:\u003c/p>\n\u003cul>\n\u003cli>Output does not exactly resemble the input person/pet.\u003c/li>\n\u003cli>Full animation generation can be absent.\u003c/li>\n\u003cli>Manual crop UI can be absent if center sampling is documented.\u003c/li>\n\u003c/ul>\n\u003cp>Reject M4 if:\u003c/p>\n\u003cul>\n\u003cli>Imported images can crash the app.\u003c/li>\n\u003cli>Saved custom assets disappear after restart.\u003c/li>\n\u003cli>The result is only a recolored seal.\u003c/li>\n\u003cli>The result is only a raw pixelated photo crop instead of the built-in character template.\u003c/li>\n\u003cli>The feature implies exact likeness but cannot deliver it.\u003c/li>\n\u003c/ul>\n\u003ch3>M5: Character Animation MVP QA\u003c/h3>\n\u003cp>Goal: Confirm the selected photo-commission character has MVP-level state animation and is visible in a real Electron screenshot.\u003c/p>\n\u003cp>Prepare:\u003c/p>\n\u003cul>\n\u003cli>Current character pack: \u003ccode>assets/characters/photo_001_travel_girl/\u003c/code>.\u003c/li>\n\u003cli>QA screenshot path after automated check: \u003ccode>C:\\tmp\\project-seal-qa\\renderer-screenshot.png\u003c/code>.\u003c/li>\n\u003c/ul>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>How To Verify\u003c/th>\u003cth>Pass Criteria\u003c/th>\u003cth>Severity\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Correct selected character\u003c/td>\u003ctd>Launch app or inspect \u003ccode>manifest.json\u003c/code> and screenshot\u003c/td>\u003ctd>Uses right-top small candidate direction, not top-left tall candidate and not rejected all-black version\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character visible\u003c/td>\u003ctd>Run Electron screenshot QA or launch app\u003c/td>\u003ctd>Character is visible, not blank and not fallback seal\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Outfit readability\u003c/td>\u003ctd>Inspect screenshot and runtime frames\u003c/td>\u003ctd>Brown hat/hair, black sunglasses/jacket, white shirt, and blue jeans are readable\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Idle frames\u003c/td>\u003ctd>Inspect \u003ccode>animations/idle-*.png\u003c/code> and observe runtime\u003c/td>\u003ctd>4 idle frames exist and play\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Walk frames\u003c/td>\u003ctd>Inspect \u003ccode>animations/walk-*.png\u003c/code> and observe runtime\u003c/td>\u003ctd>4 walk frames exist and play\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Sleep frames\u003c/td>\u003ctd>Inspect \u003ccode>animations/sleep-*.png\u003c/code> and observe runtime\u003c/td>\u003ctd>2 sleep frames exist and play\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Happy/poke frames\u003c/td>\u003ctd>Inspect \u003ccode>animations/happy-*.png\u003c/code> and click pet\u003c/td>\u003ctd>2 happy frames exist and are used for poke/happy\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>No old import UI\u003c/td>\u003ctd>Inspect app runtime\u003c/td>\u003ctd>Import/save/customizer UI is absent\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>No debug obstruction\u003c/td>\u003ctd>Inspect screenshot\u003c/td>\u003ctd>No debug label covers the character\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Frame loading\u003c/td>\u003ctd>Run app and screenshot QA\u003c/td>\u003ctd>Pixi loads animation frames without data URL texture errors\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pixel crispness\u003c/td>\u003ctd>Inspect screenshot at desktop size\u003c/td>\u003ctd>Pixel art is crisp and not blurred\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Build health\u003c/td>\u003ctd>Run \u003ccode>npm.cmd run typecheck\u003c/code>, \u003ccode>npm.cmd test\u003c/code>, \u003ccode>npm.cmd run build\u003c/code>\u003c/td>\u003ctd>All pass\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Acceptable in M5:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>annoyed\u003c/code> can reuse happy frames.\u003c/li>\n\u003cli>\u003ccode>dragged\u003c/code> can reuse idle frames with light renderer tilt.\u003c/li>\n\u003cli>Animation polish can be improved in a later art pass.\u003c/li>\n\u003c/ul>\n\u003cp>Reject M5 if:\u003c/p>\n\u003cul>\n\u003cli>Screenshot QA is skipped.\u003c/li>\n\u003cli>The pet is not visible in the screenshot.\u003c/li>\n\u003cli>The wrong candidate or rejected outfit appears.\u003c/li>\n\u003cli>Runtime motion is only whole-sprite movement for the core states.\u003c/li>\n\u003cli>Old import/save UI remains visible.\u003c/li>\n\u003c/ul>\n\u003ch3>M6: AI + Scene Interaction QA\u003c/h3>\n\u003cp>Goal: Confirm simple props and offline-safe chat support the desktop pet fantasy.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>How To Verify\u003c/th>\u003cth>Pass Criteria\u003c/th>\u003cth>Severity\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Bed prop\u003c/td>\u003ctd>Click/use bed\u003c/td>\u003ctd>Pet reacts with rest/sleep behavior\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Toy prop\u003c/td>\u003ctd>Click/use toy\u003c/td>\u003ctd>Pet reacts with play behavior\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Food prop\u003c/td>\u003ctd>Click/use food\u003c/td>\u003ctd>Pet reacts with eat/happy behavior\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Prop effects\u003c/td>\u003ctd>Inspect values/UI/debug if available\u003c/td>\u003ctd>Mood/energy/affection/hunger change correctly\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Chat entry\u003c/td>\u003ctd>Send simple message\u003c/td>\u003ctd>Pet replies or fallback appears\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Offline behavior\u003c/td>\u003ctd>Disable network and use chat\u003c/td>\u003ctd>App still works or clean fallback appears\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Model missing behavior\u003c/td>\u003ctd>Remove/disable model if applicable\u003c/td>\u003ctd>App does not crash; fallback replies work\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Timeout/cancel\u003c/td>\u003ctd>Trigger slow response if possible\u003c/td>\u003ctd>UI recovers and pet returns to normal state\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Talking state\u003c/td>\u003ctd>Chat while pet is moving/sleeping\u003c/td>\u003ctd>Talking state enters/exits cleanly\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Tone\u003c/td>\u003ctd>Review replies\u003c/td>\u003ctd>Replies feel cute, short, and bilingual-ready\u003c/td>\u003ctd>Minor\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Acceptable in M6:\u003c/p>\n\u003cul>\n\u003cli>AI can be mock/fallback-only if local model is not ready.\u003c/li>\n\u003cli>Props can use placeholder art.\u003c/li>\n\u003c/ul>\n\u003cp>Reject M6 if:\u003c/p>\n\u003cul>\n\u003cli>Chat failure breaks the pet runtime.\u003c/li>\n\u003cli>Offline use is blocked.\u003c/li>\n\u003cli>Props feel disconnected or do not trigger visible reactions.\u003c/li>\n\u003c/ul>\n\u003ch3>M7: Steam Candidate QA\u003c/h3>\n\u003cp>Goal: Confirm the MVP can be packaged and reviewed as a Steam candidate.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>How To Verify\u003c/th>\u003cth>Pass Criteria\u003c/th>\u003cth>Severity\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Clean package\u003c/td>\u003ctd>Run Windows package script\u003c/td>\u003ctd>Build artifact is created\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Fresh install/launch\u003c/td>\u003ctd>Launch packaged app outside dev environment\u003c/td>\u003ctd>App starts without dev tools\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Offline launch\u003c/td>\u003ctd>Disconnect network and launch\u003c/td>\u003ctd>App works offline\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Exit path\u003c/td>\u003ctd>Use tray/menu Exit\u003c/td>\u003ctd>App exits fully\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Settings\u003c/td>\u003ctd>Change key settings and restart\u003c/td>\u003ctd>Settings persist\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Save data\u003c/td>\u003ctd>Move/interact/customize, restart\u003c/td>\u003ctd>Save data persists\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Two-hour idle\u003c/td>\u003ctd>Leave app running\u003c/td>\u003ctd>No crash, runaway CPU/memory, or stuck state\u003c/td>\u003ctd>Blocker\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Low-spec smoke\u003c/td>\u003ctd>Test on a lower-spec Windows machine if available\u003c/td>\u003ctd>App remains usable\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Multi-monitor smoke\u003c/td>\u003ctd>Test on different-resolution monitors if available\u003c/td>\u003ctd>App remains visible and controllable across screens\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Store screenshots\u003c/td>\u003ctd>Capture required scenes\u003c/td>\u003ctd>Screenshots show real app, not only mockups\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Trailer capture\u003c/td>\u003ctd>Record 30-45 seconds\u003c/td>\u003ctd>Core loop and customization are visible\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Privacy wording\u003c/td>\u003ctd>Review store/EULA text\u003c/td>\u003ctd>Local image processing and offline behavior are clear\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Known issues\u003c/td>\u003ctd>Open release notes/checklist\u003c/td>\u003ctd>Known issues and cuts are documented\u003c/td>\u003ctd>Major\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Acceptable in M6:\u003c/p>\n\u003cul>\n\u003cli>Steam achievements can be absent.\u003c/li>\n\u003cli>Cloud save can be absent.\u003c/li>\n\u003cli>Workshop can be absent.\u003c/li>\n\u003c/ul>\n\u003cp>Reject M6 if:\u003c/p>\n\u003cul>\n\u003cli>Packaged app cannot launch cleanly.\u003c/li>\n\u003cli>Offline experience is broken.\u003c/li>\n\u003cli>Exit/save/settings are unreliable.\u003c/li>\n\u003cli>Store material overpromises features not in the build.\u003c/li>\n\u003c/ul>\n\u003ch3>Final MVP Acceptance\u003c/h3>\n\u003cp>Accept the MVP only when:\u003c/p>\n\u003cul>\n\u003cli>All M7 blocker checks pass.\u003c/li>\n\u003cli>Any major failures are either fixed or explicitly deferred by owner.\u003c/li>\n\u003cli>The app can be safely used as a desktop companion for a normal session.\u003c/li>\n\u003cli>The default white baby seal is strong enough to carry the store page.\u003c/li>\n\u003c/ul>"}]},{"id":"qa","label":"QA","files":["qa-tester-process.md","m2-qa-report.md","m3-qa-report.md","m4-qa-report.md","m5-qa-report.md"],"docs":[{"file":"docs/project-plan/qa-tester-process.md","exists":true,"updatedAt":"2026-07-05T15:39:00.010Z","html":"\u003ch2>QA Tester Process\u003c/h2>\n\u003ch3>Purpose\u003c/h3>\n\u003cp>The QA Tester subagent verifies each milestone before owner acceptance. The QA pass is a gate, not a replacement for owner review.\u003c/p>\n\u003ch3>When QA Runs\u003c/h3>\n\u003cp>QA runs after the owner or implementation subagent says a milestone is ready.\u003c/p>\n\u003cp>Required order:\u003c/p>\n\u003cp>1. Implementation complete.\u003c/p>\n\u003cp>2. QA Tester review.\u003c/p>\n\u003cp>3. Fix blocker/major failures.\u003c/p>\n\u003cp>4. QA Tester recheck when needed.\u003c/p>\n\u003cp>5. Owner final acceptance.\u003c/p>\n\u003ch3>QA Tester Inputs\u003c/h3>\n\u003cp>Each QA run should receive:\u003c/p>\n\u003cul>\n\u003cli>Milestone name.\u003c/li>\n\u003cli>Relevant acceptance document.\u003c/li>\n\u003cli>Relevant section from \u003ccode>milestone-qa-checklists.md\u003c/code>.\u003c/li>\n\u003cli>Current known limitations.\u003c/li>\n\u003cli>Any checks that require owner hardware confirmation.\u003c/li>\n\u003c/ul>\n\u003ch3>QA Tester Output Format\u003c/h3>\n\u003cp>QA Tester must report in this format:\u003c/p>\n\u003cpre>\u003ccode>Milestone:\nBuild/Test Commands Run:\nEnvironment:\n\nSummary:\n- Recommendation: Accept / Accept with tracked issues / Reject\n- Blockers:\n- Major Issues:\n- Minor Issues:\n- Owner Confirmation Required:\n\nChecklist Results:\n| Check | Result | Notes |\n| --- | --- | --- |\n\nBugs:\n1. Severity:\n   Steps:\n   Expected:\n   Actual:\n   Evidence:\n\nRetest Needed:\u003c/code>\u003c/pre>\n\u003ch3>What QA Tester Can Automate\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>npm.cmd run typecheck\u003c/code>\u003c/li>\n\u003cli>\u003ccode>npm.cmd run build\u003c/code>\u003c/li>\n\u003cli>Launch smoke checks when possible.\u003c/li>\n\u003cli>File existence checks.\u003c/li>\n\u003cli>Configuration checks.\u003c/li>\n\u003cli>Save file inspection when safe.\u003c/li>\n\u003cli>Log/error output review.\u003c/li>\n\u003c/ul>\n\u003ch3>What QA Tester Cannot Fully Automate\u003c/h3>\n\u003cul>\n\u003cli>Visual cuteness judgment.\u003c/li>\n\u003cli>Real multi-monitor behavior on the user's exact hardware.\u003c/li>\n\u003cli>Long soak tests unless explicitly asked.\u003c/li>\n\u003cli>Steam store review.\u003c/li>\n\u003cli>Final commercial art quality.\u003c/li>\n\u003c/ul>\n\u003cp>These should be reported as owner confirmation required.\u003c/p>\n\u003ch3>Severity Rules\u003c/h3>\n\u003cp>Blocker:\u003c/p>\n\u003cul>\n\u003cli>App cannot launch.\u003c/li>\n\u003cli>App cannot exit.\u003c/li>\n\u003cli>Core milestone feature is missing.\u003c/li>\n\u003cli>Data loss or crash.\u003c/li>\n\u003cli>Unsafe desktop behavior.\u003c/li>\n\u003c/ul>\n\u003cp>Major:\u003c/p>\n\u003cul>\n\u003cli>Feature works unreliably.\u003c/li>\n\u003cli>Visual behavior is confusing.\u003c/li>\n\u003cli>Persistence is inconsistent.\u003c/li>\n\u003cli>Performance risk is visible.\u003c/li>\n\u003c/ul>\n\u003cp>Minor:\u003c/p>\n\u003cul>\n\u003cli>Debug UI polish.\u003c/li>\n\u003cli>Placeholder visuals.\u003c/li>\n\u003cli>Copy/text issues.\u003c/li>\n\u003cli>Non-final asset quality.\u003c/li>\n\u003c/ul>\n\u003ch3>Art Change Screenshot QA\u003c/h3>\n\u003cp>Any change to character art, animation frames, scaling, frame loading, renderer visibility, or UI elements near the pet must run screenshot QA before handoff.\u003c/p>\n\u003cp>Minimum required checks:\u003c/p>\n\u003cul>\n\u003cli>Build the app or renderer output used by QA.\u003c/li>\n\u003cli>Launch an Electron QA window with the target character data.\u003c/li>\n\u003cli>Capture a screenshot of the rendered pet.\u003c/li>\n\u003cli>Confirm the character is visible and not blocked by UI.\u003c/li>\n\u003cli>Confirm the intended art traits are visible at runtime size.\u003c/li>\n\u003cli>Attach or show the screenshot before asking the owner to accept the art change.\u003c/li>\n\u003c/ul>\n\u003cp>For the current character, screenshot QA must confirm:\u003c/p>\n\u003cul>\n\u003cli>Brown beanie and hair.\u003c/li>\n\u003cli>Black sunglasses and jacket.\u003c/li>\n\u003cli>White shirt.\u003c/li>\n\u003cli>Blue jeans.\u003c/li>\n\u003cli>No fallback seal.\u003c/li>\n\u003cli>No old import/save UI.\u003c/li>\n\u003cli>No debug label covering the pet.\u003c/li>\n\u003c/ul>"},{"file":"docs/project-plan/m2-qa-report.md","exists":true,"updatedAt":"2026-06-18T15:17:36.330Z","html":"\u003ch2>M2 QA Report\u003c/h2>\n\u003ch3>Milestone\u003c/h3>\n\u003cp>M2 Pet Runtime\u003c/p>\n\u003ch3>Build/Test Commands Run\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>npm.cmd run typecheck\u003c/code>: Pass.\u003c/li>\n\u003cli>\u003ccode>npm.cmd run build\u003c/code>: Pass.\u003c/li>\n\u003cli>Key file existence check: Pass.\u003c/li>\n\u003cli>M2 static implementation check: Pass.\u003c/li>\n\u003c/ul>\n\u003ch3>Environment\u003c/h3>\n\u003cul>\n\u003cli>Windows / PowerShell.\u003c/li>\n\u003cli>Project path: \u003ccode>C:\\Users\\ASUS\\Desktop\\Project Seal\u003c/code>.\u003c/li>\n\u003cli>QA Tester did not perform long-running GUI observation.\u003c/li>\n\u003c/ul>\n\u003ch3>Summary\u003c/h3>\n\u003cul>\n\u003cli>Recommendation: Accept with tracked issues.\u003c/li>\n\u003cli>Blockers: None.\u003c/li>\n\u003cli>Major issues: None.\u003c/li>\n\u003cli>Minor issues: None.\u003c/li>\n\u003cli>Owner confirmation required:\u003c/li>\n\u003cli>Dynamic visual behavior.\u003c/li>\n\u003cli>5-minute no-stuck-state interaction check.\u003c/li>\n\u003cli>15-minute idle performance check.\u003c/li>\n\u003cli>Owner-confirmed pass:\u003c/li>\n\u003cli>Mixed-resolution multi-monitor drag/display behavior.\u003c/li>\n\u003c/ul>\n\u003ch3>Checklist Results\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>Result\u003c/th>\u003cth>Notes\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Build health\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>\u003ccode>typecheck\u003c/code> and \u003ccode>build\u003c/code> passed\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Key files exist\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>\u003ccode>src/main/main.ts\u003c/code>, \u003ccode>src/preload/preload.ts\u003c/code>, \u003ccode>src/renderer/renderer.ts\u003c/code>, \u003ccode>src/renderer/styles.css\u003c/code> exist\u003c/td>\u003c/tr>\u003ctr>\u003ctd>State union\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Includes \u003ccode>idle\u003c/code>, \u003ccode>walk\u003c/code>, \u003ccode>sleep\u003c/code>, \u003ccode>dragged\u003c/code>, \u003ccode>happy\u003c/code>, \u003ccode>annoyed\u003c/code>, \u003ccode>poke\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Preload API\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Exposes \u003ccode>startWindowDrag\u003c/code>, \u003ccode>stopWindowDrag\u003c/code>, \u003ccode>savePet\u003c/code>, \u003ccode>getInitialState\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Multi-monitor drag implementation\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Main process uses \u003ccode>screen.getCursorScreenPoint()\u003c/code> and \u003ccode>screen.getAllDisplays()\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Runtime persistence\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Runtime store read/write, pet save, and window position save exist\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Mixed-resolution multi-monitor\u003c/td>\u003ctd>Owner-confirmed pass\u003c/td>\u003ctd>User confirmed cross-screen dragging/display is OK\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Idle/walk/sleep/poke/happy/annoyed visual behavior\u003c/td>\u003ctd>Covered by static implementation\u003c/td>\u003ctd>Needs owner visual confirmation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>No stuck states\u003c/td>\u003ctd>Owner confirmation required\u003c/td>\u003ctd>Needs 5-minute interaction observation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Idle performance\u003c/td>\u003ctd>Owner confirmation required\u003c/td>\u003ctd>Needs 15-minute idle observation\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Bugs\u003c/h3>\n\u003cp>None reported.\u003c/p>\n\u003ch3>Retest Needed\u003c/h3>\n\u003cul>\n\u003cli>Owner short GUI test:\u003c/li>\n\u003cli>Launch.\u003c/li>\n\u003cli>Click.\u003c/li>\n\u003cli>Drag.\u003c/li>\n\u003cli>Wait for sleep.\u003c/li>\n\u003cli>Repeated click for annoyed.\u003c/li>\n\u003cli>Restart and confirm position persistence.\u003c/li>\n\u003cli>Owner longer observation:\u003c/li>\n\u003cli>5-minute interaction test with no stuck state.\u003c/li>\n\u003cli>15-minute idle performance test.\u003c/li>\n\u003c/ul>"},{"file":"docs/project-plan/m3-qa-report.md","exists":true,"updatedAt":"2026-06-22T13:09:45.061Z","html":"\u003ch2>M3 QA Report\u003c/h2>\n\u003ch3>Milestone\u003c/h3>\n\u003cp>M3 Character Pack + Seal Art Pass\u003c/p>\n\u003ch3>Build/Test Commands Run\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>npm.cmd run typecheck\u003c/code>: Pass.\u003c/li>\n\u003cli>\u003ccode>npm.cmd run build\u003c/code>: Pass.\u003c/li>\n\u003cli>Manifest JSON/required fields check: Pass.\u003c/li>\n\u003cli>Main/preload/renderer static checks: Pass.\u003c/li>\n\u003c/ul>\n\u003ch3>Summary\u003c/h3>\n\u003cul>\n\u003cli>Recommendation: Accept with tracked issues.\u003c/li>\n\u003cli>Blockers: None.\u003c/li>\n\u003cli>Major issues:\u003c/li>\n\u003cli>Initial QA found missing official art source/metadata under \u003ccode>assets/characters/default_pet\u003c/code>.\u003c/li>\n\u003cli>Minor issues:\u003c/li>\n\u003cli>Visual switch/readability not directly observed by QA Tester.\u003c/li>\n\u003cli>Owner confirmation required:\u003c/li>\n\u003cli>Visual \u003ccode>C\u003c/code> key switching.\u003c/li>\n\u003cli>White seal readability on light/dark backgrounds.\u003c/li>\n\u003cli>Pixel crispness at desktop scaling.\u003c/li>\n\u003c/ul>\n\u003ch3>Initial QA Finding\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>Result\u003c/th>\u003cth>Notes\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Manifest loading\u003c/td>\u003ctd>Pass static\u003c/td>\u003ctd>Main process scans \u003ccode>assets/characters/*/manifest.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Missing animation fallback\u003c/td>\u003ctd>Pass static\u003c/td>\u003ctd>Renderer uses procedural palette drawing; \u003ccode>test_gray_seal\u003c/code> intentionally references missing art\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character swap\u003c/td>\u003ctd>Pass static\u003c/td>\u003ctd>\u003ccode>runtime:set-active-character\u003c/code>, preload \u003ccode>setActiveCharacter\u003c/code>, renderer \u003ccode>C\u003c/code> key cycle present\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art source tracking\u003c/td>\u003ctd>Major issue\u003c/td>\u003ctd>Default character initially had only \u003ccode>manifest.json\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Fix Applied\u003c/h3>\n\u003cp>Added:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>assets/characters/default_pet/art-metadata.json\u003c/code>\u003c/li>\n\u003cli>\u003ccode>assets/characters/default_pet/README.md\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>These explicitly track the procedural placeholder source status and final art requirements.\u003c/p>\n\u003ch3>Retest Needed\u003c/h3>\n\u003cul>\n\u003cli>QA Tester retest for art source tracking.\u003c/li>\n\u003cli>Owner visual confirmation for:\u003c/li>\n\u003cli>Press \u003ccode>C\u003c/code> to switch between \u003ccode>Seal\u003c/code> and \u003ccode>Gray Test Seal\u003c/code>.\u003c/li>\n\u003cli>Seal readability on light/dark backgrounds.\u003c/li>\n\u003cli>Pixel crispness at current desktop scaling.\u003c/li>\n\u003c/ul>\n\u003ch3>Retest Result\u003c/h3>\n\u003cp>QA Tester retest completed.\u003c/p>\n\u003cp>Results:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>assets/characters/default_pet/art-metadata.json\u003c/code>: Exists and JSON is valid.\u003c/li>\n\u003cli>\u003ccode>assets/characters/default_pet/README.md\u003c/code>: Exists.\u003c/li>\n\u003cli>\u003ccode>assets/characters/default_pet/manifest.json\u003c/code>: JSON is valid.\u003c/li>\n\u003cli>\u003ccode>npm.cmd run typecheck\u003c/code>: Pass.\u003c/li>\n\u003cli>\u003ccode>npm.cmd run build\u003c/code>: Pass.\u003c/li>\n\u003c/ul>\n\u003cp>Conclusion:\u003c/p>\n\u003cul>\n\u003cli>Previous Major issue is resolved.\u003c/li>\n\u003cli>No current blocker or major issue found by QA Tester.\u003c/li>\n\u003cli>Final QA recommendation: Accept.\u003c/li>\n\u003c/ul>"},{"file":"docs/project-plan/m4-qa-report.md","exists":true,"updatedAt":"2026-06-29T14:20:25.259Z","html":"\u003ch2>M4 QA Report - Photo-To-Pixel Customization\u003c/h2>\n\u003ch3>Result\u003c/h3>\n\u003cp>Recommendation: Owner verification pending\u003c/p>\n\u003cp>Blockers: None\u003c/p>\n\u003cp>Major issues: None\u003c/p>\n\u003cp>Minor issues: None\u003c/p>\n\u003ch3>Commands\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>npm.cmd run typecheck\u003c/code>: Pass\u003c/li>\n\u003cli>\u003ccode>npm.cmd run build\u003c/code>: Pass\u003c/li>\n\u003c/ul>\n\u003ch3>Automated Checks\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>Result\u003c/th>\u003cth>Notes\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>M4 docs exist\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>\u003ccode>m4-photo-to-pixel-acceptance.md\u003c/code> and \u003ccode>m4-local-privacy-note.md\u003c/code> exist\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Main IPC save entry\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>\u003ccode>runtime:save-custom-character\u003c/code> exists\u003c/td>\u003c/tr>\u003ctr>\u003ctd>User data custom character root\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Custom characters are saved under Electron \u003ccode>userData/custom-characters\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Custom manifest, preview, metadata write\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Writes \u003ccode>manifest.json\u003c/code>, \u003ccode>preview.png\u003c/code>, and \u003ccode>art-metadata.json\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character pack listing\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Scans built-in character packs and user custom packs\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Preload API\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Exposes \u003ccode>saveCustomCharacter\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Renderer UI\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Import, Save, preview canvas exist; preview uses template generation (Bug 2 fixed)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local image read\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Uses local \u003ccode>FileReader.readAsDataURL\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Template preview\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Now always generates template from sourceImage via generateTemplatePixelCharacter; no stale preview loading (Bug 2 fixed)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Custom character restore\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>getActiveCharacter() no longer skips custom_ prefixed IDs (Bug 1 fixed)\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Palette extraction\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Samples the local photo for palette/accent hints\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Save flow call\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Calls \u003ccode>window.desktopPet.saveCustomCharacter(...)\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local privacy\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Static check found no upload/network path in the import flow\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Owner Confirmation Required (M4 Re-verification)\u003c/h3>\n\u003cp>请在本地运行 \u003ccode>npm.cmd run dev\u003c/code> 后逐项确认：\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>#\u003c/th>\u003cth>验收项\u003c/th>\u003cth>期望结果\u003c/th>\u003cth>通过？\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>1\u003c/td>\u003ctd>启动界面\u003c/td>\u003ctd>画面有像素模板小人（鲍勃发型+耳机），底部有 Import 按钮，Save 按钮灰色不可点\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003ctr>\u003ctd>2\u003c/td>\u003ctd>像素小人标准\u003c/td>\u003ctd>预览框内是 Q 版人物模板（有头发、耳机、身体轮廓），\u003cstrong>不是海豹，也不是照片直接像素化\u003c/strong>\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003ctr>\u003ctd>3\u003c/td>\u003ctd>导入正常图片\u003c/td>\u003ctd>点 Import → 选照片 → 预览框出现\u003cstrong>受照片调色板影响的模板小人\u003c/strong>（颜色变了，形状仍是模板人物）\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003ctr>\u003ctd>4\u003c/td>\u003ctd>Save 按钮激活\u003c/td>\u003ctd>导入图片后 Save 按钮变为可点击\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003ctr>\u003ctd>5\u003c/td>\u003ctd>保存角色\u003c/td>\u003ctd>点 Save → 底部 label 变为 \u003ccode>Custom Character\u003c/code> → 主画面切换为保存的角色\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003ctr>\u003ctd>6\u003c/td>\u003ctd>重启持久化\u003c/td>\u003ctd>关闭并重新运行 → 自定义角色仍然是激活状态（Bug 1 修复验证）\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003ctr>\u003ctd>7\u003c/td>\u003ctd>交互状态\u003c/td>\u003ctd>点击(poke)、拖动、睡眠状态动画仍正常\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003ctr>\u003ctd>8\u003c/td>\u003ctd>离线验证\u003c/td>\u003ctd>断网时 Import + Save 流程正常，无网络报错\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003ctr>\u003ctd>9\u003c/td>\u003ctd>异常图片\u003c/td>\u003ctd>上传非图片文件 → 不崩溃，小人变为 annoyed\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003ctr>\u003ctd>10\u003c/td>\u003ctd>构建验证\u003c/td>\u003ctd>\u003ccode>npm.cmd run typecheck\u003c/code> 和 \u003ccode>npm.cmd run build\u003c/code> 成功\u003c/td>\u003ctd>☐\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Notes\u003c/h3>\n\u003cp>Bug 1 (getActiveCharacter custom character skip) and Bug 2 (useApprovedBaselinePreview stale preview loading) both fixed. Owner must re-verify the two original rejection reasons: (1) template character standard and (2) photo-to-palette copy effect on the template character.\u003c/p>"},{"file":"docs/project-plan/m5-qa-report.md","exists":true,"updatedAt":"2026-07-05T15:43:36.903Z","html":"\u003ch2>M5 QA Report - Character Animation MVP\u003c/h2>\n\u003ch3>Result\u003c/h3>\n\u003cp>Recommendation: Pass for owner verification\u003c/p>\n\u003cp>Blockers: None\u003c/p>\n\u003cp>Major issues: None open\u003c/p>\n\u003cp>Minor issues: Dedicated \u003ccode>annoyed\u003c/code> and \u003ccode>dragged\u003c/code> frames are deferred.\u003c/p>\n\u003ch3>Commands\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>npm.cmd run typecheck\u003c/code>: Pass\u003c/li>\n\u003cli>\u003ccode>npm.cmd test\u003c/code>: Pass, 4 test files and 64 tests\u003c/li>\n\u003cli>\u003ccode>npm.cmd run build\u003c/code>: Pass\u003c/li>\n\u003c/ul>\n\u003ch3>Automated Checks\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>Result\u003c/th>\u003cth>Notes\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Manifest animation schema\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>\u003ccode>manifest.json\u003c/code> lists frame arrays for idle, walk, sleep, happy, poke, annoyed, and dragged\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Runtime frame count\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>idle 4, walk 4, sleep 2, happy 2\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Runtime frame size\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>All committed runtime frames are 48x64 PNGs\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Visual signature\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Static QA detected brown hat/hair, black jacket/sunglasses, white shirt/skin, and blue jeans in every runtime frame\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Texture loading\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Renderer now loads each frame through \u003ccode>Image()\u003c/code> before creating Pixi textures\u003c/td>\u003c/tr>\u003ctr>\u003ctd>State frame playback\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Renderer selects frame sets by pet state and advances by state-specific FPS\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Old import UI removed\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>\u003ccode>Import\u003c/code>, \u003ccode>Save\u003c/code>, image input, preview canvas, and customizer panel are absent from runtime HTML/CSS\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Debug label obstruction\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>\u003ccode>#state-label\u003c/code> is hidden so it does not block the character\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Fallback safety\u003c/td>\u003ctd>Pass\u003c/td>\u003ctd>Missing/non-template character still falls back to drawn seal instead of crashing\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>V2 Meowa job IDs\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>State\u003c/th>\u003cth>Job ID\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>idle\u003c/td>\
