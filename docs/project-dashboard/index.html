<script id="dashboard-data" type="application/json">{"generatedAt":"2026-07-08T15:36:25.862Z","docs":[{"id":"gdd","label":"GDD","files":["project-seal-gdd.md"],"docs":[{"file":"docs/project-plan/project-seal-gdd.md","exists":true,"updatedAt":"2026-07-08T14:30:50.112Z","html":"\u003ch2>Project Seal GDD\u003c/h2>\n\u003ch3>1. High Concept\u003c/h3>\n\u003cp>Project Seal is a personal-use Windows desktop pet. It is no longer planned as a Steam sale product. The design target is a private, modern pixel desktop companion inspired by QQ Pet: the pet lives directly on the desktop, reacts to simple interaction, has visible needs systems, and stays visually quiet unless the user interacts with it.\u003c/p>\n\u003cp>The default mascot direction remains a white baby seal, while the current implemented active character pack is \u003ccode>photo_001_travel_girl\u003c/code>.\u003c/p>\n\u003ch3>2. Design Pillars\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Pillar\u003c/th>\u003cth>Design Meaning\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Quiet desktop presence\u003c/td>\u003ctd>By default only the pet is visible. UI appears only on hover, double-click, or explicit interaction.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QQ Pet-style care loop\u003c/td>\u003ctd>Health, mood, hunger, and money form the core simulation values.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Personal and local\u003c/td>\u003ctd>The project is for personal use; chat records, distilled style data, and generated assets stay local unless explicitly exported.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pixel-coherent\u003c/td>\u003ctd>Pet art, UI, icons, bubbles, and panels share one pixel scale and one Art Director style.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Safe control\u003c/td>\u003ctd>The pet must remain draggable, closable, and non-invasive.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>3. Target Experience\u003c/h3>\n\u003cp>The user sees only a small pixel pet on the desktop during normal use. When the mouse hovers over the pet, a compact QQ Pet-style status UI appears, showing health, mood, hunger, and money. When the user double-clicks the pet, a conversation box opens.\u003c/p>\n\u003cp>Later, the user can import WeChat chat records. The app locally distills the other person's speaking style and uses that style in the double-click conversation flow. The goal is tone simulation for personal companionship, not public chatbot publishing.\u003c/p>\n\u003ch3>4. Core Loop\u003c/h3>\n\u003cp>1. Pet idles on the desktop with no persistent UI around it.\u003c/p>\n\u003cp>2. User hovers over pet and sees health, mood, hunger, and money.\u003c/p>\n\u003cp>3. User drags, pokes, feeds, plays, rests, or opens chat.\u003c/p>\n\u003cp>4. Pet reacts with animation and short pixel UI feedback.\u003c/p>\n\u003cp>5. Values change: health, mood, hunger, money.\u003c/p>\n\u003cp>6. User can double-click to talk with the pet or style-simulated persona.\u003c/p>\n\u003cp>7. Pet returns to quiet desktop presence.\u003c/p>\n\u003ch3>5. Core Systems\u003c/h3>\n\u003ch4>5.1 Needs Values\u003c/h4>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Value\u003c/th>\u003cth>Meaning\u003c/th>\u003cth>Changes From\u003c/th>\u003cth>UI Rule\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Health\u003c/td>\u003ctd>Overall condition and long-term care state\u003c/td>\u003ctd>Low hunger, poor rest, time, care actions\u003c/td>\u003ctd>Hover status only\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Mood\u003c/td>\u003ctd>Emotional state and interaction quality\u003c/td>\u003ctd>Poke, play, chat, neglect, props\u003c/td>\u003ctd>Hover status only\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Hunger\u003c/td>\u003ctd>Need for food\u003c/td>\u003ctd>Time decay, food item use\u003c/td>\u003ctd>Hover status only\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Money\u003c/td>\u003ctd>Soft resource for food/props/cosmetics\u003c/td>\u003ctd>Planned rewards or manual grant in personal build\u003c/td>\u003ctd>Hover status only\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>The previous mood/energy/affection/hunger model is replaced by the QQ Pet-like health/mood/hunger/money model for active planning.\u003c/p>\n\u003ch4>5.2 Desktop Visibility Rules\u003c/h4>\n\u003cul>\n\u003cli>Default state: only the pet sprite is visible.\u003c/li>\n\u003cli>Hover state: show compact pixel status UI anchored near the pet.\u003c/li>\n\u003cli>Double-click state: open the conversation box.\u003c/li>\n\u003cli>Interaction state: show only short feedback needed for the action.\u003c/li>\n\u003cli>Debug labels, import panels, and permanent app UI must not cover the pet during normal use.\u003c/li>\n\u003c/ul>\n\u003ch4>5.3 Conversation System\u003c/h4>\n\u003cp>MVP direction:\u003c/p>\n\u003cul>\n\u003cli>Double-click opens a compact chat box.\u003c/li>\n\u003cli>Chat can start with fallback persona replies.\u003c/li>\n\u003cli>WeChat chat import is planned as the personalization path.\u003c/li>\n\u003c/ul>\n\u003cp>WeChat import pipeline:\u003c/p>\n\u003cp>1. User provides exported WeChat chat records.\u003c/p>\n\u003cp>2. Import parser normalizes messages into local structured data.\u003c/p>\n\u003cp>3. Local distillation extracts tone, phrase patterns, rhythm, emoji habits, and common reply shapes.\u003c/p>\n\u003cp>4. A local persona profile is created.\u003c/p>\n\u003cp>5. Double-click conversation uses that profile to simulate speaking style.\u003c/p>\n\u003cp>Privacy boundary:\u003c/p>\n\u003cul>\n\u003cli>Chat records are personal and local-only by default.\u003c/li>\n\u003cli>Do not commit raw chat records to git.\u003c/li>\n\u003cli>Do not send chat records to Meowa.\u003c/li>\n\u003cli>Any LLM use must be local or explicitly approved by the owner.\u003c/li>\n\u003c/ul>\n\u003ch3>6. Pet States\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>State\u003c/th>\u003cth>Trigger\u003c/th>\u003cth>Purpose\u003c/th>\u003cth>MVP Art\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Idle\u003c/td>\u003ctd>Default\u003c/td>\u003ctd>Quiet presence\u003c/td>\u003ctd>Implemented\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Walk\u003c/td>\u003ctd>Timer or small movement\u003c/td>\u003ctd>Autonomous life\u003c/td>\u003ctd>Implemented\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Sleep\u003c/td>\u003ctd>Low activity or rest\u003c/td>\u003ctd>Care loop support\u003c/td>\u003ctd>Implemented\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Dragged\u003c/td>\u003ctd>User drag\u003c/td>\u003ctd>Direct manipulation\u003c/td>\u003ctd>Implemented with reuse/tilt\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Happy/Poke\u003c/td>\u003ctd>Click or positive interaction\u003c/td>\u003ctd>Immediate feedback\u003c/td>\u003ctd>Implemented\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Hungry\u003c/td>\u003ctd>Hunger low\u003c/td>\u003ctd>QQ Pet-like needs feedback\u003c/td>\u003ctd>Planned\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Sick/Low health\u003c/td>\u003ctd>Health low\u003c/td>\u003ctd>Care warning\u003c/td>\u003ctd>Planned\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Chatting\u003c/td>\u003ctd>Double-click conversation\u003c/td>\u003ctd>Personal dialogue\u003c/td>\u003ctd>Planned\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Eating\u003c/td>\u003ctd>Food action\u003c/td>\u003ctd>Hunger recovery\u003c/td>\u003ctd>Planned\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Playing\u003c/td>\u003ctd>Toy/action\u003c/td>\u003ctd>Mood recovery\u003c/td>\u003ctd>Planned\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Priority order: dragged, chatting, eating/playing, sick/low health, hungry, happy/poke, sleep, walk, idle.\u003c/p>\n\u003ch3>7. Art Direction\u003c/h3>\n\u003ch4>7.1 Character Art\u003c/h4>\n\u003cp>The active runtime character is \u003ccode>photo_001_travel_girl\u003c/code>:\u003c/p>\n\u003cul>\n\u003cli>Brown knit beanie.\u003c/li>\n\u003cli>Black sunglasses.\u003c/li>\n\u003cli>Long brown hair.\u003c/li>\n\u003cli>Black leather jacket.\u003c/li>\n\u003cli>White inner shirt.\u003c/li>\n\u003cli>Blue jeans.\u003c/li>\n\u003cli>Small chibi pixel proportions.\u003c/li>\n\u003c/ul>\n\u003cp>Current runtime frames:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>idle\u003c/code>: 4 frames.\u003c/li>\n\u003cli>\u003ccode>walk\u003c/code>: 4 frames.\u003c/li>\n\u003cli>\u003ccode>sleep\u003c/code>: 2 frames.\u003c/li>\n\u003cli>\u003ccode>happy/poke\u003c/code>: 2 frames.\u003c/li>\n\u003c/ul>\n\u003ch4>7.2 Pixel Proportion Lock\u003c/h4>\n\u003cp>Before adding new UI or commissioning more Meowa UI assets, the Art Director must lock the overall pixel proportion system:\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Item\u003c/th>\u003cth>Decision Needed\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Runtime character frame\u003c/td>\u003ctd>Confirm final logical frame size and display scale.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Status UI pixel grid\u003c/td>\u003ctd>Confirm unit size, border thickness, icon size, and font size.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Chat box grid\u003c/td>\u003ctd>Confirm panel width, line height, avatar/icon slot, and bubble padding.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Prop scale\u003c/td>\u003ctd>Confirm bed/toy/food size relative to pet height.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>No UI kit should be implemented until the pet-to-UI scale is confirmed.\u003c/p>\n\u003ch4>7.3 Meowa UI Kit Rule\u003c/h4>\n\u003cp>After pixel proportions are locked, the unified Art Director generates prompts for a Meowa-assisted pixel UI kit that matches the pet scale.\u003c/p>\n\u003cp>The UI kit should include:\u003c/p>\n\u003cul>\n\u003cli>Hover status frame.\u003c/li>\n\u003cli>Health icon/bar.\u003c/li>\n\u003cli>Mood icon/bar.\u003c/li>\n\u003cli>Hunger icon/bar.\u003c/li>\n\u003cli>Money icon/counter.\u003c/li>\n\u003cli>Double-click chat box.\u003c/li>\n\u003cli>Small action buttons if needed.\u003c/li>\n\u003cli>Bed, food, toy UI/prop icons.\u003c/li>\n\u003c/ul>\n\u003cp>All Meowa prompts must come from the unified Art Director. Engineers may run approved prompts and implement outputs, but must not rewrite art direction ad hoc. Every UI/art change requires screenshot QA.\u003c/p>\n\u003ch3>8. Scene And Care Design\u003c/h3>\n\u003cp>The scene remains lightweight. It should support care actions rather than a full room editor.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Object\u003c/th>\u003cth>Function\u003c/th>\u003cth>Value Effect\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Food\u003c/td>\u003ctd>Feed pet\u003c/td>\u003ctd>Hunger recovers, mood may improve, money decreases\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Toy\u003c/td>\u003ctd>Play\u003c/td>\u003ctd>Mood improves, hunger may decay faster\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Bed\u003c/td>\u003ctd>Rest/sleep\u003c/td>\u003ctd>Health improves, mood stabilizes\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Money is a soft personal-use resource. It can start as a debug/manual value before any earning loop is designed.\u003c/p>\n\u003ch3>9. Versioned Idea Backlog\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Bucket\u003c/th>\u003cth>Include\u003c/th>\u003cth>Current Candidate Ideas\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>MVP\u003c/td>\u003ctd>Required for the personal QQ Pet-style loop\u003c/td>\u003ctd>Hover stats, health/mood/hunger/money, double-click chat shell, current animated character, local save\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Next\u003c/td>\u003ctd>Directly supports the new direction after MVP\u003c/td>\u003ctd>WeChat import parser, local style distillation, pixel UI kit, hungry/sick states, food/toy/bed actions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>1.0 Personal\u003c/td>\u003ctd>Stable daily-use polish\u003c/td>\u003ctd>Settings, low-resource mode, robust local data management, chat profile management, backup/export\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Content Update\u003c/td>\u003ctd>Cosmetic or interaction expansion\u003c/td>\u003ctd>More outfits, props, seasonal UI skins, more reactions, extra commissioned characters\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Later/Reject\u003c/td>\u003ctd>Too broad or not aligned with personal local use\u003c/td>\u003ctd>Steam store launch, cloud accounts, online social feed, public chatbot sharing, Workshop, voice features unless explicitly revived\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>10. Current Status\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Milestone\u003c/th>\u003cth>Status\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>M0 Product Lock\u003c/td>\u003ctd>Complete, but active product target refreshed to personal use\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M1 Desktop Shell\u003c/td>\u003ctd>Complete\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M2 Pet Runtime\u003c/td>\u003ctd>Complete\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M3 Character Packs\u003c/td>\u003ctd>Complete\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M4 Photo Commission Pipeline\u003c/td>\u003ctd>Complete\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M5 Character Animation MVP\u003c/td>\u003ctd>Complete pending owner acceptance\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M6 Personal Care + Hover UI\u003c/td>\u003ctd>Not started\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M7 WeChat Persona Chat Slice\u003c/td>\u003ctd>Not started\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M8 Personal Build Polish\u003c/td>\u003ctd>Not started\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>11. Acceptance Standards\u003c/h3>\n\u003cp>The personal-use MVP is acceptable when:\u003c/p>\n\u003cul>\n\u003cli>The pet runs quietly with only the sprite visible by default.\u003c/li>\n\u003cli>Hover shows health, mood, hunger, and money without blocking normal desktop use.\u003c/li>\n\u003cli>Double-click opens a usable conversation box.\u003c/li>\n\u003cli>Drag, poke, idle, walk, sleep, and happy/poke remain stable.\u003c/li>\n\u003cli>The active character is visible in screenshot QA and never silently falls back to the wrong character.\u003c/li>\n\u003cli>Local saves persist pet position and core values.\u003c/li>\n\u003cli>No raw chat records, private photos, or API keys are committed.\u003c/li>\n\u003c/ul>"}]},{"id":"prd","label":"PRD","files":["project-seal-prd.md"],"docs":[{"file":"docs/project-plan/project-seal-prd.md","exists":true,"updatedAt":"2026-07-08T14:30:50.114Z","html":"\u003ch2>Project Seal PRD\u003c/h2>\n\u003ch3>1. Product Summary\u003c/h3>\n\u003cp>Project Seal is a personal-use Windows desktop pet inspired by QQ Pet. It is no longer planned as a Steam sale product. The app should run locally, show only the pixel pet by default, reveal status UI on hover, and open a conversation box on double-click.\u003c/p>\n\u003cp>The current active character is \u003ccode>photo_001_travel_girl\u003c/code>. The default white baby seal remains the mascot direction and fallback first-party character concept.\u003c/p>\n\u003ch3>2. Product Goals\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Goal\u003c/th>\u003cth>Requirement\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Quiet daily desktop use\u003c/td>\u003ctd>Only the pet is visible by default; UI appears on hover or explicit interaction.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QQ Pet-style care loop\u003c/td>\u003ctd>Health, mood, hunger, and money are the core values.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Personal conversation\u003c/td>\u003ctd>Double-click opens chat; future WeChat import can simulate a selected person's speaking style.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pixel-coherent art/UI\u003c/td>\u003ctd>Character, status UI, chat box, and props use one locked pixel proportion system.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local/private data\u003c/td>\u003ctd>Photos, chat records, persona profiles, and API keys remain local and out of git.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>3. Target User\u003c/h3>\n\u003cp>Primary user:\u003c/p>\n\u003cul>\n\u003cli>The owner, using the app personally on Windows.\u003c/li>\n\u003c/ul>\n\u003cp>Secondary future user:\u003c/p>\n\u003cul>\n\u003cli>A trusted private tester, only after local privacy and data handling are safe.\u003c/li>\n\u003c/ul>\n\u003cp>The product is not currently optimized for public sale, store onboarding, or broad customer support.\u003c/p>\n\u003ch3>4. P0 Requirements\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Feature\u003c/th>\u003cth>Requirement\u003c/th>\u003cth>Acceptance\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Quiet desktop pet\u003c/td>\u003ctd>Default screen shows only the pet sprite\u003c/td>\u003ctd>No permanent import/settings/debug panel around the pet\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Hover status\u003c/td>\u003ctd>Mouse hover reveals health, mood, hunger, money\u003c/td>\u003ctd>UI appears near pet, remains readable, disappears when not hovered\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Core values\u003c/td>\u003ctd>Replace active care model with health/mood/hunger/money\u003c/td>\u003ctd>Values persist locally and can drive state changes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Double-click chat shell\u003c/td>\u003ctd>Double-click opens a compact conversation box\u003c/td>\u003ctd>Box opens/closes without breaking pet animation or drag\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Existing animation stability\u003c/td>\u003ctd>Current idle/walk/sleep/happy/poke still work\u003c/td>\u003ctd>M5 screenshot QA remains valid after UI changes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local save\u003c/td>\u003ctd>Position, active character, and core values persist\u003c/td>\u003ctd>Restart restores expected state\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art proportion lock\u003c/td>\u003ctd>Art Director confirms pet/UI pixel scale before UI kit generation\u003c/td>\u003ctd>UI implementation does not begin from mismatched proportions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art Director prompt gate\u003c/td>\u003ctd>Meowa UI/character prompts come from unified Art Director\u003c/td>\u003ctd>Prompt summary and output path are recorded\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Screenshot QA\u003c/td>\u003ctd>Every visual/UI/art change is screenshot-verified\u003c/td>\u003ctd>Screenshot shown before owner acceptance\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>5. P1 Requirements\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Feature\u003c/th>\u003cth>Requirement\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>WeChat import parser\u003c/td>\u003ctd>Import owner-provided WeChat chat export into local structured records\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Style distillation\u003c/td>\u003ctd>Extract tone, phrase habits, reply rhythm, emoji/punctuation patterns, and common expressions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Persona profile\u003c/td>\u003ctd>Store distilled style locally as a profile separate from raw chat logs\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Styled chat replies\u003c/td>\u003ctd>Double-click chat uses the persona profile to imitate speaking style\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Food/toy/bed actions\u003c/td>\u003ctd>Care props affect health, mood, hunger, and money\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Hungry/sick feedback\u003c/td>\u003ctd>Low hunger or health changes pet state or hover UI warning\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Meowa pixel UI kit\u003c/td>\u003ctd>Generate and implement status/chat UI assets that match the locked pet scale\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>6. P2 / Later Requirements\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Feature\u003c/th>\u003cth>Reason To Defer\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Public Steam build\u003c/td>\u003ctd>Cancelled for current direction\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Store assets/trailer\u003c/td>\u003ctd>Not needed for personal use\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Cloud/account sync\u003c/td>\u003ctd>Conflicts with local-private design\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Workshop/public sharing\u003c/td>\u003ctd>Not aligned with current personal-use scope\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Voice recognition/synthesis\u003c/td>\u003ctd>High privacy and implementation risk\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Multi-pet runtime\u003c/td>\u003ctd>More complexity than current care loop needs\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Exact identity simulation claims\u003c/td>\u003ctd>Risky and unnecessary; style imitation is enough\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>7. Current Implementation Baseline\u003c/h3>\n\u003cp>Completed:\u003c/p>\n\u003cul>\n\u003cli>Electron + PixiJS + TypeScript desktop runtime.\u003c/li>\n\u003cli>Transparent desktop pet window.\u003c/li>\n\u003cli>State machine and drag/poke behavior.\u003c/li>\n\u003cli>Cross-monitor drag fixes verified by owner for M2.\u003c/li>\n\u003cli>Manifest-driven character pack loading and fallback.\u003c/li>\n\u003cli>Photo-commission character production pipeline using Meowa.\u003c/li>\n\u003cli>Active character \u003ccode>photo_001_travel_girl\u003c/code> with M5 animation frames.\u003c/li>\n\u003cli>Old import/save UI removed from runtime.\u003c/li>\n\u003cli>Screenshot QA requirement for art changes.\u003c/li>\n\u003cli>Git rule requiring verified non-ignored changes to commit and push.\u003c/li>\n\u003c/ul>\n\u003cp>Needs update for new direction:\u003c/p>\n\u003cul>\n\u003cli>Replace active values with health/mood/hunger/money.\u003c/li>\n\u003cli>Add hover-only status UI.\u003c/li>\n\u003cli>Add double-click chat box.\u003c/li>\n\u003cli>Define local WeChat import and distillation format.\u003c/li>\n\u003cli>Lock pixel proportions and generate matching UI kit through Meowa.\u003c/li>\n\u003c/ul>\n\u003ch3>8. Planned Milestones\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Milestone\u003c/th>\u003cth>Product Outcome\u003c/th>\u003cth>Status\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>M0 Product Lock\u003c/td>\u003ctd>Original product lock; refreshed target is now personal use\u003c/td>\u003ctd>Complete / superseded by PRD refresh\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M1 Desktop Shell\u003c/td>\u003ctd>Desktop pet window launches, moves, hides, exits\u003c/td>\u003ctd>Complete\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M2 Pet Runtime\u003c/td>\u003ctd>State machine, interactions, save, cross-screen safety\u003c/td>\u003ctd>Complete\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M3 Character Packs\u003c/td>\u003ctd>Manifest-driven character packs and fallback\u003c/td>\u003ctd>Complete\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M4 Photo Commission Pipeline\u003c/td>\u003ctd>Owner photo to art-directed character pack workflow\u003c/td>\u003ctd>Complete\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M5 Character Animation MVP\u003c/td>\u003ctd>Meowa-assisted animation frames and state playback\u003c/td>\u003ctd>Complete pending owner acceptance\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M6 Personal Care + Hover UI\u003c/td>\u003ctd>Health/mood/hunger/money and hover-only status UI\u003c/td>\u003ctd>Next\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M7 WeChat Persona Chat Slice\u003c/td>\u003ctd>Double-click chat plus local WeChat style profile\u003c/td>\u003ctd>Planned\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M8 Personal Build Polish\u003c/td>\u003ctd>Settings, data hygiene, local backup/export, stability\u003c/td>\u003ctd>Planned\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>9. WeChat Import And Persona Distillation\u003c/h3>\n\u003ch4>Input\u003c/h4>\n\u003cp>Supported input is owner-provided exported WeChat chat records. Exact export format still needs confirmation during implementation.\u003c/p>\n\u003ch4>Local Processing Goals\u003c/h4>\n\u003cul>\n\u003cli>Normalize sender, timestamp, message type, and text.\u003c/li>\n\u003cli>Filter unsupported media or represent them as placeholders.\u003c/li>\n\u003cli>Extract writing style features from the target person.\u003c/li>\n\u003cli>Build a compact persona profile used by the chat runtime.\u003c/li>\n\u003c/ul>\n\u003ch4>Distilled Style Profile Should Capture\u003c/h4>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Dimension\u003c/th>\u003cth>Examples\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Tone\u003c/td>\u003ctd>gentle, teasing, concise, direct, playful\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Phrase habits\u003c/td>\u003ctd>common openings, endings, filler words\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Reply length\u003c/td>\u003ctd>short bursts, long paragraphs, one-line replies\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Emoji/sticker habits\u003c/td>\u003ctd>emoji frequency, expressive markers, repeated symbols\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Punctuation rhythm\u003c/td>\u003ctd>ellipses, exclamation, question marks, line breaks\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Topic boundaries\u003c/td>\u003ctd>what the persona should avoid or refuse\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch4>Privacy Requirements\u003c/h4>\n\u003cul>\n\u003cli>Raw chat exports are ignored and never committed.\u003c/li>\n\u003cli>Persona profiles should be local by default.\u003c/li>\n\u003cli>Any model call involving chat records must be local unless owner explicitly approves otherwise.\u003c/li>\n\u003cli>The app should clearly distinguish style simulation from the real person.\u003c/li>\n\u003c/ul>\n\u003ch3>10. Pixel UI Kit Requirements\u003c/h3>\n\u003cp>Before implementation:\u003c/p>\n\u003cp>1. Art Director confirms character frame size, display scale, and UI grid.\u003c/p>\n\u003cp>2. Art Director writes Meowa prompts for a UI kit matching the pet scale.\u003c/p>\n\u003cp>3. Meowa outputs are previewed before implementation.\u003c/p>\n\u003cp>4. Selected UI assets are normalized and implemented.\u003c/p>\n\u003cp>5. Screenshot QA verifies hover and chat UI at runtime size.\u003c/p>\n\u003cp>UI kit assets:\u003c/p>\n\u003cul>\n\u003cli>Hover status frame.\u003c/li>\n\u003cli>Health, mood, hunger, money icons.\u003c/li>\n\u003cli>Pixel bars or counters.\u003c/li>\n\u003cli>Conversation box frame.\u003c/li>\n\u003cli>Chat input area.\u003c/li>\n\u003cli>Optional close/send buttons.\u003c/li>\n\u003cli>Food/toy/bed icons or prop UI.\u003c/li>\n\u003c/ul>\n\u003ch3>11. Non-Functional Requirements\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Area\u003c/th>\u003cth>Requirement\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Stability\u003c/td>\u003ctd>Pet can idle for long personal sessions without crash.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Performance\u003c/td>\u003ctd>Idle mode stays low CPU/GPU.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Visibility\u003c/td>\u003ctd>No persistent UI unless hovered, chatting, or explicitly opened.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Privacy\u003c/td>\u003ctd>Raw WeChat logs, private photos, and API keys are never committed.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Offline\u003c/td>\u003ctd>Core pet and local chat fallback work without network.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art QA\u003c/td>\u003ctd>Every UI/art/animation change has screenshot QA evidence.\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Git\u003c/td>\u003ctd>Non-ignored verified changes are committed and pushed.\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>12. Open Questions\u003c/h3>\n\u003cul>\n\u003cli>What exact WeChat export format will be used first?\u003c/li>\n\u003cli>Should raw chat logs remain only outside the repo, or should sanitized sample fixtures be created for tests?\u003c/li>\n\u003cli>Should the first style simulation use rules/templates, a local LLM, or both?\u003c/li>\n\u003cli>What final pet frame size and display scale should be locked before UI kit generation?\u003c/li>\n\u003cli>Should money be earned over time, granted manually, or tied to care actions in the personal build?\u003c/li>\n\u003c/ul>"}]},{"id":"milestones","label":"Milestones","files":["m0-product-lock.md","m1-desktop-shell-acceptance.md","m2-pet-runtime-acceptance.md","m3-character-pack-acceptance.md","m4-photo-to-pixel-acceptance.md","m5-character-animation-acceptance.md","mvp-milestones-and-agent-roles.md","milestone-qa-checklists.md"],"docs":[{"file":"docs/project-plan/m0-product-lock.md","exists":true,"updatedAt":"2026-07-08T14:32:15.108Z","html":"\u003ch2>M0 Product Lock\u003c/h2>\n\u003ch3>Status\u003c/h3>\n\u003cp>M0 originally locked a Steam-oriented MVP. That target has now been superseded by the personal-use PRD/GDD refresh dated 2026-07-08.\u003c/p>\n\u003cp>Current active target: personal-use Windows desktop pet inspired by QQ Pet.\u003c/p>\n\u003ch3>Refreshed Product Inputs\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Item\u003c/th>\u003cth>Decision\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Project name\u003c/td>\u003ctd>Project Seal\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Current use target\u003c/td>\u003ctd>Personal use, not Steam sale\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Default pet\u003c/td>\u003ctd>White baby seal mascot/fallback direction\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Active character\u003c/td>\u003ctd>\u003ccode>photo_001_travel_girl\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Platform\u003c/td>\u003ctd>Windows first\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Distribution\u003c/td>\u003ctd>Local personal build\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Monetization\u003c/td>\u003ctd>None for current scope\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Visual style\u003c/td>\u003ctd>Cute Q-version pixel art\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Core tech\u003c/td>\u003ctd>Electron + PixiJS + TypeScript\u003c/td>\u003c/tr>\u003ctr>\u003ctd>AI stance\u003c/td>\u003ctd>Local/private first; never blocks core pet runtime\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Core values\u003c/td>\u003ctd>Health, mood, hunger, money\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>MVP Promise\u003c/h3>\n\u003cp>Project Seal is a small, cute, offline desktop companion. The active version should make a pixel pet live quietly on the user's desktop, show QQ Pet-style status only on hover, react to simple interactions, and open a conversation box on double-click.\u003c/p>\n\u003cp>The MVP is not a public commercial release, full AI companion, social platform, cloud service, or asset marketplace.\u003c/p>\n\u003ch3>Target User Experience\u003c/h3>\n\u003cp>The user should be able to:\u003c/p>\n\u003cp>1. Launch Project Seal.\u003c/p>\n\u003cp>2. See only the desktop pet during normal idle use.\u003c/p>\n\u003cp>3. Hover over the pet to see health, mood, hunger, and money.\u003c/p>\n\u003cp>4. Drag, poke, hide, show, and exit the pet safely.\u003c/p>\n\u003cp>5. Watch the pet idle, walk, sleep, and react.\u003c/p>\n\u003cp>6. Use simple food/toy/bed actions later.\u003c/p>\n\u003cp>7. Double-click to open a conversation box.\u003c/p>\n\u003cp>8. Import WeChat chat records later for local style distillation.\u003c/p>\n\u003cp>9. Run the app offline without account or server dependency.\u003c/p>\n\u003ch3>Must-Have MVP Features\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Feature\u003c/th>\u003cth>Reason\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Transparent always-on-top desktop pet window\u003c/td>\u003ctd>Core desktop pet identity\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Tray menu with show/hide/exit\u003c/td>\u003ctd>Safety and user control\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Drag/poke basic interaction\u003c/td>\u003ctd>Immediate tactile feedback\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pet state machine\u003c/td>\u003ctd>Makes the pet feel alive\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character pack manifest\u003c/td>\u003ctd>Enables replacement and future skins\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Health/mood/hunger/money\u003c/td>\u003ctd>QQ Pet-style care loop\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Hover-only status UI\u003c/td>\u003ctd>Keeps the desktop clean\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Double-click chat shell\u003c/td>\u003ctd>Entry point for personal conversation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local save/settings\u003c/td>\u003ctd>Required for daily personal use\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local/private data handling\u003c/td>\u003ctd>Required for WeChat record import\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Explicit Non-Goals For Current Scope\u003c/h3>\n\u003cul>\n\u003cli>Steam sale or store launch.\u003c/li>\n\u003cli>Steam Workshop.\u003c/li>\n\u003cli>Cloud save.\u003c/li>\n\u003cli>Online account.\u003c/li>\n\u003cli>Multiplayer or social feed.\u003c/li>\n\u003cli>Public persona/chatbot sharing.\u003c/li>\n\u003cli>Exact identity simulation claims.\u003c/li>\n\u003cli>Voice recognition.\u003c/li>\n\u003cli>Voice synthesis.\u003c/li>\n\u003cli>Multiple pets active at once.\u003c/li>\n\u003cli>Mac/Linux support.\u003c/li>\n\u003cli>Complex economy, quests, or achievements.\u003c/li>\n\u003c/ul>\n\u003ch3>Version Placement Rules For New Ideas\u003c/h3>\n\u003cp>Use these buckets for future notes from the idea subagent:\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Bucket\u003c/th>\u003cth>Criteria\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>MVP\u003c/td>\u003ctd>Needed to prove quiet desktop pet, hover status, care values, double-click chat shell, local save\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Next\u003c/td>\u003ctd>Directly supports personal-use direction after MVP, such as WeChat import and UI kit\u003c/td>\u003c/tr>\u003ctr>\u003ctd>1.0 Personal\u003c/td>\u003ctd>Requires stable systems or broader QA for daily personal use\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Content Update\u003c/td>\u003ctd>Mostly skins, props, reactions, seasonal content, or cosmetic expansion\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Later/Reject\u003c/td>\u003ctd>Too expensive, too risky, online-dependent, or aimed at public commercial release\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Bilingual Scope\u003c/h3>\n\u003cp>The app remains bilingual-ready, but current personal use is Chinese-first. Once UI text grows beyond prototypes, text must move into a central string table.\u003c/p>\n\u003ch3>AI And WeChat Scope\u003c/h3>\n\u003cp>AI is allowed only if it is local/private and fallback-safe.\u003c/p>\n\u003cp>Can include:\u003c/p>\n\u003cul>\n\u003cli>Short pet replies.\u003c/li>\n\u003cli>Local prompt/persona configuration.\u003c/li>\n\u003cli>Local WeChat chat record parsing.\u003c/li>\n\u003cli>Style distillation from a target person's chat history.\u003c/li>\n\u003cli>Timeout and cancel handling.\u003c/li>\n\u003cli>Fallback canned replies when no model/profile is present.\u003c/li>\n\u003c/ul>\n\u003cp>Must not:\u003c/p>\n\u003cul>\n\u003cli>Block launch.\u003c/li>\n\u003cli>Block pet animation.\u003c/li>\n\u003cli>Require internet by default.\u003c/li>\n\u003cli>Commit raw chat logs.\u003c/li>\n\u003cli>Send chat records to external services without explicit owner approval.\u003c/li>\n\u003c/ul>\n\u003ch3>Art Scope\u003c/h3>\n\u003cp>Before new UI implementation, the Art Director must lock the pet/UI pixel proportion system. Meowa UI kit prompts must come from the unified Art Director and must match the locked scale.\u003c/p>\n\u003cp>M0 does not require final seal art, final UI kit, WeChat parser, or local model downloads.\u003c/p>"},{"file":"docs/project-plan/m1-desktop-shell-acceptance.md","exists":true,"updatedAt":"2026-06-17T15:04:45.283Z","html":"\u003ch2>M1 Desktop Shell Acceptance\u003c/h2>\n\u003ch3>Goal\u003c/h3>\n\u003cp>M1 proves that Project Seal can exist as a desktop pet shell on Windows. It does not need final art, AI, settings UI, photo import, or Steam packaging.\u003c/p>\n\u003ch3>What Is Included\u003c/h3>\n\u003cul>\n\u003cli>Electron desktop shell.\u003c/li>\n\u003cli>Transparent frameless window.\u003c/li>\n\u003cli>Always-on-top pet window.\u003c/li>\n\u003cli>Draggable pet window.\u003c/li>\n\u003cli>System tray menu.\u003c/li>\n\u003cli>Show, hide, and exit controls.\u003c/li>\n\u003cli>PixiJS renderer.\u003c/li>\n\u003cli>Temporary white baby seal placeholder.\u003c/li>\n\u003c/ul>\n\u003ch3>How To Run\u003c/h3>\n\u003cp>From the project folder:\u003c/p>\n\u003cpre>\u003ccode>npm.cmd run dev\u003c/code>\u003c/pre>\n\u003cp>If the shell cannot find npm, use:\u003c/p>\n\u003cpre>\u003ccode>&amp; &quot;C:\\Users\\ASUS\\DeveloperTools\\nodejs\\npm.cmd&quot; run dev\u003c/code>\u003c/pre>\n\u003ch3>User Acceptance Checklist\u003c/h3>\n\u003cp>Pass M1 only if all required checks pass.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>Required Result\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Launch\u003c/td>\u003ctd>Running the dev command opens Project Seal without a crash\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Transparency\u003c/td>\u003ctd>The app window has no normal rectangular background\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Always-on-top\u003c/td>\u003ctd>The seal stays above other normal windows\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Drag\u003c/td>\u003ctd>Dragging the seal area moves the pet window\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Tray show/hide\u003c/td>\u003ctd>The tray menu can hide and show Project Seal\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Tray exit\u003c/td>\u003ctd>The tray menu can fully exit the app\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Close behavior\u003c/td>\u003ctd>Closing the window hides it instead of losing control of the process\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Placeholder art\u003c/td>\u003ctd>The visible placeholder clearly suggests a white baby seal\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Taskbar behavior\u003c/td>\u003ctd>The app does not create a normal taskbar workflow requirement\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Non-Blocking Issues For M1\u003c/h3>\n\u003cp>These can be accepted and moved to later milestones:\u003c/p>\n\u003cul>\n\u003cli>Placeholder art is not final.\u003c/li>\n\u003cli>No click/poke reaction yet.\u003c/li>\n\u003cli>No settings panel yet.\u003c/li>\n\u003cli>No language toggle yet.\u003c/li>\n\u003cli>No save/restore position yet.\u003c/li>\n\u003cli>No click-through/lock mode yet.\u003c/li>\n\u003cli>No Steam build yet.\u003c/li>\n\u003cli>Earlier builds warned about \u003ccode>#\u003c/code> in the folder name. The project folder has since been renamed to \u003ccode>Project Seal\u003c/code>, so this warning should no longer appear.\u003c/li>\n\u003c/ul>\n\u003ch3>Fail Conditions\u003c/h3>\n\u003cp>M1 fails if:\u003c/p>\n\u003cul>\n\u003cli>The app cannot launch.\u003c/li>\n\u003cli>The window shows an opaque rectangular background.\u003c/li>\n\u003cli>The user cannot exit from tray/menu.\u003c/li>\n\u003cli>The pet cannot be moved at all.\u003c/li>\n\u003cli>The process stays running after using Exit.\u003c/li>\n\u003cli>The prototype is too visually ambiguous to recognize as Project Seal's white seal direction.\u003c/li>\n\u003c/ul>\n\u003ch3>Troubleshooting\u003c/h3>\n\u003cp>If the terminal says \u003ccode>Error: Electron uninstall\u003c/code>, the Electron npm package exists but its runtime binary is missing. Verify with:\u003c/p>\n\u003cpre>\u003ccode>Test-Path node_modules/electron/dist/electron.exe\u003c/code>\u003c/pre>\n\u003cp>It should return \u003ccode>True\u003c/code>. This project has already been repaired once by extracting the cached Electron runtime into \u003ccode>node_modules/electron/dist\u003c/code> and writing \u003ccode>node_modules/electron/path.txt\u003c/code>.\u003c/p>\n\u003cp>If the dev command leaves Electron or Node processes running after a failed launch, close them from the tray first. If needed, stop only project-owned processes from Task Manager.\u003c/p>\n\u003cp>If the terminal says \u003ccode>Failed to load url /src/renderer/renderer.ts\u003c/code>, make sure all old Project Seal/Electron processes are closed and restart \u003ccode>npm.cmd run dev\u003c/code>. The renderer entry has been moved to \u003ccode>src/renderer/renderer.ts\u003c/code> and the HTML now loads \u003ccode>./renderer.ts\u003c/code>.\u003c/p>\n\u003ch3>Owner Review Notes\u003c/h3>\n\u003cp>When reviewing M1, focus on desktop shell viability, not final visual polish. If the shell feels controllable and safe, move to M2 and build the pet runtime/state machine.\u003c/p>"},{"file":"docs/project-plan/m2-pet-runtime-acceptance.md","exists":true,"updatedAt":"2026-06-17T15:41:08.944Z","html":"\u003ch2>M2 Pet Runtime Acceptance\u003c/h2>\n\u003ch3>Goal\u003c/h3>\n\u003cp>M2 proves that Project Seal has a basic pet runtime, not only a desktop shell. The seal should idle, move, sleep, react to pokes, react to dragging, update simple values, and remember its position/basic state after restart.\u003c/p>\n\u003ch3>What Is Included\u003c/h3>\n\u003cul>\n\u003cli>Finite state machine.\u003c/li>\n\u003cli>States: \u003ccode>idle\u003c/code>, \u003ccode>walk\u003c/code>, \u003ccode>sleep\u003c/code>, \u003ccode>dragged\u003c/code>, \u003ccode>poke\u003c/code>, \u003ccode>happy\u003c/code>, \u003ccode>annoyed\u003c/code>.\u003c/li>\n\u003cli>Pointer-based drag handling.\u003c/li>\n\u003cli>Main-process cursor-follow dragging for mixed-resolution multi-monitor setups.\u003c/li>\n\u003cli>Click/poke recognition.\u003c/li>\n\u003cli>Repeated-poke annoyed reaction.\u003c/li>\n\u003cli>Mood, energy, affection, and hunger values.\u003c/li>\n\u003cli>Debug state label and mini value bars.\u003c/li>\n\u003cli>Runtime save file in Electron user data.\u003c/li>\n\u003cli>Window position persistence.\u003c/li>\n\u003c/ul>\n\u003ch3>How To Run\u003c/h3>\n\u003cp>From the project folder:\u003c/p>\n\u003cpre>\u003ccode>cd &quot;C:\\Users\\ASUS\\Desktop\\Project Seal&quot;\nnpm.cmd run dev\u003c/code>\u003c/pre>\n\u003cp>If npm is not found:\u003c/p>\n\u003cpre>\u003ccode>&amp; &quot;C:\\Users\\ASUS\\DeveloperTools\\nodejs\\npm.cmd&quot; run dev\u003c/code>\u003c/pre>\n\u003ch3>User Acceptance Checklist\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>Required Result\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Launch\u003c/td>\u003ctd>Project Seal launches without terminal errors\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Idle\u003c/td>\u003ctd>The seal has a visible idle breathing motion\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Walk\u003c/td>\u003ctd>Waiting a few seconds causes a visible walk/sway state\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Sleep\u003c/td>\u003ctd>Leaving it alone long enough causes sleep with closed eyes / sleep bubbles\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Wake\u003c/td>\u003ctd>Clicking a sleeping seal wakes it into a reaction state\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Dragged\u003c/td>\u003ctd>Dragging the seal changes the state label to \u003ccode>DRAGGED\u003c/code> and moves the window\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Poke\u003c/td>\u003ctd>A click without dragging changes state to \u003ccode>POKE\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Happy\u003c/td>\u003ctd>Releasing after a drag or gentle interaction can show \u003ccode>HAPPY\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Annoyed\u003c/td>\u003ctd>Repeated rapid pokes show \u003ccode>ANNOYED\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Values\u003c/td>\u003ctd>The bottom label shows \u003ccode>M\u003c/code>, \u003ccode>E\u003c/code>, \u003ccode>A\u003c/code>, \u003ccode>H\u003c/code> values and they change with interactions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>No stuck state\u003c/td>\u003ctd>After interactions, the seal returns to idle/walk/sleep naturally\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Position save\u003c/td>\u003ctd>Move the seal, exit, relaunch; it should reopen near the moved position\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Mixed-resolution multi-monitor\u003c/td>\u003ctd>Drag the seal between two monitors with different resolutions/scaling\u003c/td>\u003ctd>The seal remains visible, draggable, correctly transparent, and does not jump off-screen\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Build health\u003c/td>\u003ctd>\u003ccode>npm.cmd run typecheck\u003c/code> and \u003ccode>npm.cmd run build\u003c/code> pass\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Expected Timing\u003c/h3>\n\u003cul>\n\u003cli>Poke reaction: immediate.\u003c/li>\n\u003cli>Annoyed reaction: after several rapid clicks.\u003c/li>\n\u003cli>Walk/idle changes: within a few seconds.\u003c/li>\n\u003cli>Sleep: after roughly 12 seconds of no interaction or low energy.\u003c/li>\n\u003c/ul>\n\u003ch3>Cross-Monitor Fix Notes\u003c/h3>\n\u003cp>Dragging is now handled by the Electron main process using \u003ccode>screen.getCursorScreenPoint()\u003c/code> and all-display work areas. This avoids relying on renderer \u003ccode>screenX/screenY\u003c/code>, which can become inconsistent across monitors with different resolution or scaling.\u003c/p>\n\u003cp>Re-test mixed-resolution monitors by dragging the seal:\u003c/p>\n\u003cp>1. From primary monitor to secondary monitor.\u003c/p>\n\u003cp>2. From secondary monitor back to primary monitor.\u003c/p>\n\u003cp>3. Across the top and side edges between displays.\u003c/p>\n\u003cp>4. Near taskbar edges.\u003c/p>\n\u003cp>5. Exit and relaunch after placing it on the secondary monitor.\u003c/p>\n\u003ch3>Non-Blocking Issues For M2\u003c/h3>\n\u003cp>These can be accepted and moved to later milestones:\u003c/p>\n\u003cul>\n\u003cli>Placeholder art is still not final.\u003c/li>\n\u003cli>State label/debug values are visible; they can be hidden or redesigned later.\u003c/li>\n\u003cli>The walk state is an in-window sway, not full autonomous screen walking yet.\u003c/li>\n\u003cli>Position persistence is basic and may not handle every multi-monitor edge case.\u003c/li>\n\u003cli>No final settings UI.\u003c/li>\n\u003cli>No scene props.\u003c/li>\n\u003cli>No AI/chat.\u003c/li>\n\u003c/ul>\n\u003ch3>Fail Conditions\u003c/h3>\n\u003cp>M2 fails if:\u003c/p>\n\u003cul>\n\u003cli>The app cannot launch.\u003c/li>\n\u003cli>Dragging no longer moves the pet.\u003c/li>\n\u003cli>Clicking no longer produces any visible reaction.\u003c/li>\n\u003cli>Repeated interaction can permanently freeze the pet state.\u003c/li>\n\u003cli>Exit from tray/menu stops working.\u003c/li>\n\u003cli>Restart loses the moved window position every time.\u003c/li>\n\u003cli>Moving between different-resolution monitors makes the seal disappear, become unclickable, or reopen off-screen.\u003c/li>\n\u003c/ul>\n\u003ch3>Owner Review Notes\u003c/h3>\n\u003cp>Focus on whether the seal now feels alive enough to justify moving to M3 character-pack and art work. Visual polish is still secondary, but the runtime must be controllable, recover from repeated interactions, and never feel unsafe on the desktop.\u003c/p>"},{"file":"docs/project-plan/m3-character-pack-acceptance.md","exists":true,"updatedAt":"2026-06-22T13:06:53.616Z","html":"\u003ch2>M3 Character Pack + Seal Art Pass Acceptance\u003c/h2>\n\u003ch3>Goal\u003c/h3>\n\u003cp>M3 proves that Project Seal can load character packs from manifests, use fallback rendering when art files are missing, and keep the default white baby seal direction ready for final art production.\u003c/p>\n\u003ch3>What Is Included\u003c/h3>\n\u003cul>\n\u003cli>Character manifest discovery under \u003ccode>assets/characters/*/manifest.json\u003c/code>.\u003c/li>\n\u003cli>Active character persistence.\u003c/li>\n\u003cli>Default white baby seal manifest.\u003c/li>\n\u003cli>Intentionally incomplete \u003ccode>test_gray_seal\u003c/code> pack for fallback QA.\u003c/li>\n\u003cli>Temporary keyboard character switch: press \u003ccode>C\u003c/code> while the app is focused.\u003c/li>\n\u003cli>Procedural seal fallback driven by manifest palette.\u003c/li>\n\u003cli>White baby seal art specification.\u003c/li>\n\u003c/ul>\n\u003ch3>Character Pack Format\u003c/h3>\n\u003cp>Required files:\u003c/p>\n\u003cpre>\u003ccode>assets/characters/&lt;character_id&gt;/\n  manifest.json\n  art-metadata.json\u003c/code>\u003c/pre>\n\u003cp>Recommended files later:\u003c/p>\n\u003cpre>\u003ccode>assets/characters/&lt;character_id&gt;/\n  manifest.json\n  preview.png\n  &lt;character_id&gt;.aseprite\n  &lt;character_id&gt;_sheet.png\u003c/code>\u003c/pre>\n\u003cp>Required manifest fields:\u003c/p>\n\u003cpre>\u003ccode>{\n  &quot;id&quot;: &quot;default_seal&quot;,\n  &quot;name&quot;: &quot;Seal&quot;,\n  &quot;scale&quot;: 3,\n  &quot;theme&quot;: &quot;white_baby_seal&quot;,\n  &quot;renderMode&quot;: &quot;procedural_seal&quot;,\n  &quot;fallbackToProcedural&quot;: true,\n  &quot;palette&quot;: {\n    &quot;body&quot;: &quot;#f8fcff&quot;,\n    &quot;outline&quot;: &quot;#b8c7d2&quot;,\n    &quot;flipper&quot;: &quot;#e5eef5&quot;,\n    &quot;shadow&quot;: &quot;#355070&quot;,\n    &quot;cheek&quot;: &quot;#ff9fb3&quot;\n  },\n  &quot;animations&quot;: {\n    &quot;idle&quot;: &quot;default_seal_sheet.png&quot;\n  },\n  &quot;personality&quot;: {\n    &quot;tone&quot;: &quot;cute_bilingual&quot;,\n    &quot;catchphrases&quot;: [&quot;arf!&quot;]\n  }\n}\u003c/code>\u003c/pre>\n\u003ch3>White Baby Seal Art Spec\u003c/h3>\n\u003cp>First production art should follow:\u003c/p>\n\u003cul>\n\u003cli>Source canvas: 96x96 preferred, 64x64 acceptable for simple states.\u003c/li>\n\u003cli>Runtime footprint: readable inside the current 320x320 desktop window.\u003c/li>\n\u003cli>Silhouette: round head, oval body, short flippers, soft low-profile body.\u003c/li>\n\u003cli>Face: simple dark eyes, small nose/muzzle, readable expression at small size.\u003c/li>\n\u003cli>Palette: off-white body, blue-gray outline, pale flippers, subtle shadow.\u003c/li>\n\u003cli>Avoid pure white-only shading so the seal remains visible on bright desktops.\u003c/li>\n\u003cli>Keep animation counts lean before final art quality is stable.\u003c/li>\n\u003c/ul>\n\u003cp>M3 emergency cut:\u003c/p>\n\u003cul>\n\u003cli>Final sprite sheets may be absent.\u003c/li>\n\u003cli>Procedural seal fallback may continue into M4 if the character pack contract is stable.\u003c/li>\n\u003cli>Do not cut manifest loading or fallback behavior.\u003c/li>\n\u003c/ul>\n\u003ch3>How To Run\u003c/h3>\n\u003cpre>\u003ccode>cd &quot;C:\\Users\\ASUS\\Desktop\\Project Seal&quot;\nnpm.cmd run dev\u003c/code>\u003c/pre>\n\u003ch3>User Acceptance Checklist\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>Required Result\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Default manifest load\u003c/td>\u003ctd>App launches using the default seal manifest\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character label\u003c/td>\u003ctd>Bottom label shows the active character name\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character switch\u003c/td>\u003ctd>Pressing \u003ccode>C\u003c/code> switches between \u003ccode>Seal\u003c/code> and \u003ccode>Gray Test Seal\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Palette change\u003c/td>\u003ctd>Switching to \u003ccode>Gray Test Seal\u003c/code> visibly changes seal coloring\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Missing animation fallback\u003c/td>\u003ctd>\u003ccode>Gray Test Seal\u003c/code> does not crash even though its animation file is missing\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Persistence\u003c/td>\u003ctd>Switch character, exit, relaunch; active character should remain selected\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Runtime behavior\u003c/td>\u003ctd>M2 states still work after switching characters\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Build health\u003c/td>\u003ctd>\u003ccode>npm.cmd run typecheck\u003c/code> and \u003ccode>npm.cmd run build\u003c/code> pass\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Non-Blocking Issues For M3\u003c/h3>\n\u003cul>\n\u003cli>Final sprite sheet art is not yet present.\u003c/li>\n\u003cli>Character selection UI is a keyboard shortcut, not final UI.\u003c/li>\n\u003cli>Replacement pack is a QA test pack, not player-facing content.\u003c/li>\n\u003cli>Manifest schema is still lightweight and can evolve before Workshop/DLC support.\u003c/li>\n\u003c/ul>\n\u003ch3>Fail Conditions\u003c/h3>\n\u003cp>M3 fails if:\u003c/p>\n\u003cul>\n\u003cli>App crashes when a character pack has missing animation files.\u003c/li>\n\u003cli>Default seal no longer loads.\u003c/li>\n\u003cli>Character switching requires code changes.\u003c/li>\n\u003cli>M2 click/drag/state behavior breaks.\u003c/li>\n\u003cli>The default seal direction becomes visually ambiguous.\u003c/li>\n\u003c/ul>"},{"file":"docs/project-plan/m4-photo-to-pixel-acceptance.md","exists":true,"updatedAt":"2026-06-29T14:20:25.260Z","html":"\u003ch2>M4 Photo-To-Pixel Customization Acceptance\u003c/h2>\n\u003ch3>Goal\u003c/h3>\n\u003cp>M4 proves that Project Seal can import a local image, run it through a built-in pixel character template generator, save the generated character locally, and switch the desktop pet to that generated template character without relying on network services.\u003c/p>\n\u003ch3>What Is Included\u003c/h3>\n\u003cul>\n\u003cli>Local image import via the \u003ccode>Import\u003c/code> button.\u003c/li>\n\u003cli>Supported formats: PNG, JPEG, WebP, BMP, GIF, AVIF, HEIC, and HEIF in the file picker.\u003c/li>\n\u003cli>Built-in 48x64 Q-version pixel character template based on the approved blue-white headphone girl baseline.\u003c/li>\n\u003cli>Local photo sampling for palette/accent extraction.\u003c/li>\n\u003cli>Generated template character preview, not a direct photo sprite.\u003c/li>\n\u003cli>Local save under Electron user data.\u003c/li>\n\u003cli>Custom character manifest and preview PNG generation.\u003c/li>\n\u003cli>Immediate switch to the saved custom character.\u003c/li>\n\u003c/ul>\n\u003ch3>How To Run\u003c/h3>\n\u003cpre>\u003ccode>cd &quot;C:\\Users\\ASUS\\Desktop\\Project Seal&quot;\nnpm.cmd run dev\u003c/code>\u003c/pre>\n\u003ch3>User Acceptance Checklist\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>Required Result\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Import image\u003c/td>\u003ctd>Click \u003ccode>Import\u003c/code>, choose a normal local photo, preview appears\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Template generation\u003c/td>\u003ctd>Preview is a unified Q-version pixel template character influenced by the photo\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Save button\u003c/td>\u003ctd>\u003ccode>Save\u003c/code> is disabled before import and enabled after preview\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Save custom character\u003c/td>\u003ctd>Clicking \u003ccode>Save\u003c/code> creates and selects a custom character\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character body replacement\u003c/td>\u003ctd>The desktop pet body changes to the generated template character, not a recolored seal and not a raw photo crop\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character label\u003c/td>\u003ctd>Bottom label changes to \u003ccode>Custom Character\u003c/code> for newly saved custom characters\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local persistence\u003c/td>\u003ctd>Exit and relaunch; custom character remains selectable/active\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Runtime behavior\u003c/td>\u003ctd>Click/drag/sleep states still work after applying custom character\u003c/td>\u003c/tr>\u003ctr>\u003ctd>No network dependency\u003c/td>\u003ctd>Import/save works without network\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Bad image handling\u003c/td>\u003ctd>Invalid or failed image import should not crash the app\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Build health\u003c/td>\u003ctd>\u003ccode>npm.cmd run typecheck\u003c/code> and \u003ccode>npm.cmd run build\u003c/code> pass\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Saved Data Location\u003c/h3>\n\u003cp>Custom characters are stored locally in Electron user data:\u003c/p>\n\u003cpre>\u003ccode>%APPDATA%\\Project Seal\\custom-characters\\\u003c/code>\u003c/pre>\n\u003cp>Each generated character includes:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>manifest.json\u003c/code>\u003c/li>\n\u003cli>\u003ccode>preview.png\u003c/code> generated from the built-in pixel template\u003c/li>\n\u003cli>\u003ccode>art-metadata.json\u003c/code>\u003c/li>\n\u003c/ul>\n\u003ch3>Non-Blocking Issues For M4\u003c/h3>\n\u003cul>\n\u003cli>No manual crop UI yet; MVP uses center crop.\u003c/li>\n\u003cli>The generated character is template-based and only lightly influenced by the photo until stronger segmentation/feature extraction is added.\u003c/li>\n\u003cli>HEIC/HEIF can be selected, but actual decoding depends on Chromium/Windows codec support.\u003c/li>\n\u003cli>No full multi-frame animation generation yet; MVP animates the single imported pixel image.\u003c/li>\n\u003cli>No delete/rename UI yet.\u003c/li>\n\u003cli>No final character selection UI yet.\u003c/li>\n\u003c/ul>\n\u003ch3>Fail Conditions\u003c/h3>\n\u003cp>M4 fails if:\u003c/p>\n\u003cul>\n\u003cli>Importing a normal image crashes the app.\u003c/li>\n\u003cli>Save does not create a local custom character.\u003c/li>\n\u003cli>Saved custom character cannot be selected.\u003c/li>\n\u003cli>Saved custom character is only a recolored seal.\u003c/li>\n\u003cli>Saved custom character is only a raw pixelated photo crop instead of the built-in template character.\u003c/li>\n\u003cli>Custom character disappears after restart.\u003c/li>\n\u003cli>Image processing requires network access.\u003c/li>\n\u003c/ul>\n\u003ch3>Bug Fix Log (2026-06-29)\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Bug\u003c/th>\u003cth>File\u003c/th>\u003cth>Fix\u003c/th>\u003cth>Verified\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>getActiveCharacter() skips custom characters\u003c/td>\u003ctd>src/main/main.ts:211\u003c/td>\u003ctd>Removed \u003ccode>!startsWith('custom_')\u003c/code> filter, now returns any stored character directly\u003c/td>\u003ctd>typecheck pass\u003c/td>\u003c/tr>\u003ctr>\u003ctd>useApprovedBaselinePreview() loads stale preview\u003c/td>\u003ctd>src/renderer/renderer.ts:226-255\u003c/td>\u003ctd>Simplified to 3-line unconditional template generation from sourceImage\u003c/td>\u003ctd>typecheck pass\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>"},{"file":"docs/project-plan/m5-character-animation-acceptance.md","exists":true,"updatedAt":"2026-07-05T15:43:36.907Z","html":"\u003ch2>M5 Character Animation MVP Acceptance\u003c/h2>\n\u003ch3>Goal\u003c/h3>\n\u003cp>M5 proves that the current photo-commission character is no longer a single static sprite. The desktop pet must use a small set of state-based animation frames generated through the approved Meowa pipeline, and the result must be verified by an actual Electron screenshot before owner acceptance.\u003c/p>\n\u003ch3>Product Scope\u003c/h3>\n\u003cp>M5 is not a full animation production pass. It is the minimum animation layer required for the MVP character to feel alive at desktop size.\u003c/p>\n\u003cp>Included states:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>idle\u003c/code>: 4 frames for breathing/blink-level motion.\u003c/li>\n\u003cli>\u003ccode>walk\u003c/code>: 4 frames for small footstep/body sway motion.\u003c/li>\n\u003cli>\u003ccode>sleep\u003c/code>: 2 frames for sleepy/resting motion.\u003c/li>\n\u003cli>\u003ccode>happy\u003c/code>: 2 frames for positive reaction.\u003c/li>\n\u003cli>\u003ccode>poke\u003c/code>: reuses the \u003ccode>happy\u003c/code> reaction frames for MVP.\u003c/li>\n\u003cli>\u003ccode>annoyed\u003c/code>: reuses the \u003ccode>happy\u003c/code> reaction frames for MVP until a separate annoyed expression is commissioned.\u003c/li>\n\u003cli>\u003ccode>dragged\u003c/code>: reuses idle frames with light whole-sprite tilt as interaction feedback.\u003c/li>\n\u003c/ul>\n\u003ch3>Current Character Direction\u003c/h3>\n\u003cp>The accepted MVP character is the small top-right candidate from \u003ccode>photo-001-style-candidates-v1.png\u003c/code>, not the taller top-left candidate and not the rejected all-black pants Meowa candidate.\u003c/p>\n\u003cp>Required visual identity:\u003c/p>\n\u003cul>\n\u003cli>Brown knit beanie.\u003c/li>\n\u003cli>Black sunglasses.\u003c/li>\n\u003cli>Long brown hair.\u003c/li>\n\u003cli>Black leather jacket.\u003c/li>\n\u003cli>White inner shirt.\u003c/li>\n\u003cli>Blue jeans.\u003c/li>\n\u003cli>Small chibi pixel proportions.\u003c/li>\n\u003c/ul>\n\u003cp>Do not change the selected candidate, outfit palette, or proportions without owner approval.\u003c/p>\n\u003ch3>Implemented Assets\u003c/h3>\n\u003cp>Character pack:\u003c/p>\n\u003cpre>\u003ccode>assets/characters/photo_001_travel_girl/\u003c/code>\u003c/pre>\n\u003cp>Runtime frames:\u003c/p>\n\u003cpre>\u003ccode>assets/characters/photo_001_travel_girl/animations/idle-0.png\nassets/characters/photo_001_travel_girl/animations/idle-1.png\nassets/characters/photo_001_travel_girl/animations/idle-2.png\nassets/characters/photo_001_travel_girl/animations/idle-3.png\nassets/characters/photo_001_travel_girl/animations/walk-0.png\nassets/characters/photo_001_travel_girl/animations/walk-1.png\nassets/characters/photo_001_travel_girl/animations/walk-2.png\nassets/characters/photo_001_travel_girl/animations/walk-3.png\nassets/characters/photo_001_travel_girl/animations/sleep-0.png\nassets/characters/photo_001_travel_girl/animations/sleep-1.png\nassets/characters/photo_001_travel_girl/animations/happy-0.png\nassets/characters/photo_001_travel_girl/animations/happy-1.png\u003c/code>\u003c/pre>\n\u003cp>Preview sheet:\u003c/p>\n\u003cpre>\u003ccode>assets/characters/photo_001_travel_girl/animation-preview.png\u003c/code>\u003c/pre>\n\u003ch3>Meowa Jobs\u003c/h3>\n\u003cp>V2 art director pass is the implemented runtime asset set. V1 jobs are retained as earlier reference only.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Purpose\u003c/th>\u003cth>Job ID\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Pixel cleanup\u003c/td>\u003ctd>\u003ccode>pixelate-24ba85fcfc014135b085ea4db4ed49f5\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Idle animation\u003c/td>\u003ctd>\u003ccode>dbb0b282-aa1c-47a7-a5a3-8634b3dd6ff7\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Walk animation\u003c/td>\u003ctd>\u003ccode>67570b77-cd6e-4854-b501-0474fe284acd\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Sleep animation\u003c/td>\u003ctd>\u003ccode>3d59e8e0-7e7a-46d2-a173-5784a19cd65c\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Happy/poke animation\u003c/td>\u003ctd>\u003ccode>3888b7e2-380e-4ce3-8249-9cc8ceae5fe2\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>V2 Purpose\u003c/th>\u003cth>Job ID\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>V2 idle animation\u003c/td>\u003ctd>\u003ccode>c7f196e1-5abe-4ca4-90df-e92e2e3d338d\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>V2 walk animation\u003c/td>\u003ctd>\u003ccode>ab2e205c-bc4b-489a-8cf1-45dce17396ca\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>V2 sleep animation\u003c/td>\u003ctd>\u003ccode>d948e35e-d50c-403f-8031-ee84ef081fd3\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>V2 happy/poke animation\u003c/td>\u003ctd>\u003ccode>84149964-d804-4ebd-9ad6-d6fa1d2ea2e6\u003c/code>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>How To Run\u003c/h3>\n\u003cpre>\u003ccode>cd &quot;C:\\Users\\ASUS\\Desktop\\Project Seal&quot;\nnpm.cmd run dev\u003c/code>\u003c/pre>\n\u003ch3>User Acceptance Checklist\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Check\u003c/th>\u003cth>Required Result\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Launch\u003c/td>\u003ctd>App starts without terminal error\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Character visible\u003c/td>\u003ctd>Small brown-beanie sunglasses character is visible on desktop\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Correct candidate\u003c/td>\u003ctd>Character matches the top-right small candidate direction, not the top-left tall candidate\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Outfit lock\u003c/td>\u003ctd>Black leather jacket, white shirt, and blue jeans remain visible\u003c/td>\u003c/tr>\u003ctr>\u003ctd>No debug obstruction\u003c/td>\u003ctd>No import/save UI or debug label blocks the character\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Idle animation\u003c/td>\u003ctd>Character subtly changes frames while idle\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Walk animation\u003c/td>\u003ctd>Character uses walk frames during walk state, not only whole-sprite movement\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Sleep animation\u003c/td>\u003ctd>Character switches to sleep/rest frames after inactivity or low-energy state\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Poke/happy animation\u003c/td>\u003ctd>Clicking the pet triggers the happy/poke reaction frames\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Drag feedback\u003c/td>\u003ctd>Dragging remains responsive; light whole-sprite tilt is acceptable only as drag feedback\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pixel quality\u003c/td>\u003ctd>Runtime art remains crisp and readable at desktop size\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Screenshot QA\u003c/td>\u003ctd>Electron screenshot QA shows the character on screen before handoff\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Build health\u003c/td>\u003ctd>\u003ccode>npm.cmd run typecheck\u003c/code>, \u003ccode>npm.cmd test\u003c/code>, and \u003ccode>npm.cmd run build\u003c/code> pass\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Non-Blocking Issues For M5\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>annoyed\u003c/code> reuses happy/poke frames until a dedicated annoyed expression is generated.\u003c/li>\n\u003cli>\u003ccode>dragged\u003c/code> reuses idle frames with renderer tilt instead of dedicated dragged art.\u003c/li>\n\u003cli>Motion quality is MVP-level; a later art pass can improve frame-to-frame polish.\u003c/li>\n\u003cli>QA screenshot script is currently a local harness under \u003ccode>C:\\tmp\\project-seal-qa\u003c/code>, not a committed automated test.\u003c/li>\n\u003c/ul>\n\u003ch3>Fail Conditions\u003c/h3>\n\u003cp>M5 fails if:\u003c/p>\n\u003cul>\n\u003cli>The app launches but no character is visible.\u003c/li>\n\u003cli>The character falls back to the seal unexpectedly.\u003c/li>\n\u003cli>The character uses the rejected all-black outfit candidate.\u003c/li>\n\u003cli>The character uses the wrong top-left candidate after owner selected the top-right one.\u003c/li>\n\u003cli>The pet only moves/rotates the whole sprite for idle, walk, sleep, and happy/poke states.\u003c/li>\n\u003cli>The debug label or old import/save UI blocks the character.\u003c/li>\n\u003cli>Screenshot QA is skipped before handoff.\u003c/li>\n\u003c/ul>"},{"file":"docs/project-plan/mvp-milestones-and-agent-roles.md","exists":true,"updatedAt":"2026-06-23T11:47:43.743Z","html":"\u003ch2>MVP Milestones And Agent Roles\u003c/h2>\n\u003ch3>Scope\u003c/h3>\n\u003cp>This milestone plan covers the Project Seal MVP: a bilingual, Windows-first, offline Steam desktop pet centered on a cute white baby seal and priced around USD 1.\u003c/p>\n\u003ch3>Agent Roles\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Role\u003c/th>\u003cth>Short Name\u003c/th>\u003cth>Core Responsibility\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Main Owner\u003c/td>\u003ctd>Owner\u003c/td>\u003ctd>Product direction, task split, integration, review, final decisions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Planning + Gameplay Programmer\u003c/td>\u003ctd>Planning\u003c/td>\u003ctd>Core loop, interactions, state machine, content data\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Desktop Client Engineer\u003c/td>\u003ctd>Client\u003c/td>\u003ctd>Electron shell, transparent window, renderer, app runtime\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local AI Engineer\u003c/td>\u003ctd>AI\u003c/td>\u003ctd>Local chat bridge, persona prompts, model fallback, performance guardrails\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art Pipeline Lead\u003c/td>\u003ctd>Art\u003c/td>\u003ctd>White seal art direction, sprite specs, import/generation pipeline\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Build + Release Engineer\u003c/td>\u003ctd>Release\u003c/td>\u003ctd>Packaging, smoke tests, Steam readiness, logs, release checklist\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QA Tester\u003c/td>\u003ctd>QA\u003c/td>\u003ctd>Milestone QA, regression checks, bug reproduction, owner-facing pass/fail report\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Milestone Overview\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Milestone\u003c/th>\u003cth>Target\u003c/th>\u003cth>Exit Criteria\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>M0: Product Lock\u003c/td>\u003ctd>Day 0-1\u003c/td>\u003ctd>Product inputs, repo setup, toolchain, and MVP boundaries are locked\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M1: Desktop Shell Prototype\u003c/td>\u003ctd>Week 1\u003c/td>\u003ctd>A transparent always-on-top pet window can launch, move, hide, and exit\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M2: Pet Runtime\u003c/td>\u003ctd>Week 2\u003c/td>\u003ctd>Seal can idle, move, react, and persist basic state\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M3: Character Pack + Seal Art Pass\u003c/td>\u003ctd>Week 3\u003c/td>\u003ctd>Default seal pack format works and first art pack can be swapped without code changes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M4: Photo-To-Pixel Customization\u003c/td>\u003ctd>Week 4\u003c/td>\u003ctd>User can import an image, generate a template-based pixel character, preview it, and save it as a custom character\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M5: AI + Scene Interaction\u003c/td>\u003ctd>Week 5\u003c/td>\u003ctd>Basic offline chat and 2-3 scene props are connected to pet reactions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M6: Steam Candidate\u003c/td>\u003ctd>Week 6\u003c/td>\u003ctd>Packaged Windows build passes smoke tests and has first store/demo material\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>M0: Product Lock\u003c/h3>\n\u003cp>Goal: Make sure everyone builds the same product.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Role\u003c/th>\u003cth>Responsibilities\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Owner\u003c/td>\u003ctd>Confirm Project Seal name, white baby seal direction, bilingual scope, USD 1 target, and MVP cut line\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Planning\u003c/td>\u003ctd>Convert product direction into a concise feature priority list and define the initial state machine\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Client\u003c/td>\u003ctd>Confirm Electron + PixiJS + TypeScript project structure and dev scripts\u003c/td>\u003c/tr>\u003ctr>\u003ctd>AI\u003c/td>\u003ctd>Define the local AI MVP as optional/fallback-safe, not a blocker for core desktop pet behavior\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art\u003c/td>\u003ctd>Define white baby seal silhouette rules, first palette constraints, and reference needs\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Release\u003c/td>\u003ctd>Confirm local toolchain, Git repository, package scripts, and Windows-first release assumptions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QA\u003c/td>\u003ctd>Verify M0 documents, toolchain checks, typecheck, Git state, and missing non-blocking inputs\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Exit checklist:\u003c/p>\n\u003cul>\n\u003cli>Product inputs are documented.\u003c/li>\n\u003cli>Typecheck passes.\u003c/li>\n\u003cli>Git repo exists.\u003c/li>\n\u003cli>MVP cuts are explicit.\u003c/li>\n\u003c/ul>\n\u003ch3>M1: Desktop Shell Prototype\u003c/h3>\n\u003cp>Goal: Make the pet exist on the Windows desktop.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Role\u003c/th>\u003cth>Responsibilities\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Owner\u003c/td>\u003ctd>Review first desktop prototype and decide interaction defaults\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Planning\u003c/td>\u003ctd>Define first interaction rules: drag, poke, idle timeout, hide/show, lock mode\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Client\u003c/td>\u003ctd>Implement transparent frameless window, always-on-top, tray menu, show/hide/exit, drag mode, renderer canvas\u003c/td>\u003c/tr>\u003ctr>\u003ctd>AI\u003c/td>\u003ctd>No implementation required; provide placeholder chat entry requirements if needed\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art\u003c/td>\u003ctd>Provide temporary seal placeholder sprite or simple shape guide; confirm readable size\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Release\u003c/td>\u003ctd>Add smoke test checklist for launch, tray exit, multi-monitor, DPI, and two-hour idle later\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QA\u003c/td>\u003ctd>Run M1 QA checklist, verify launch/build, check tray show/hide/exit, and record any visual checks needing owner confirmation\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Exit checklist:\u003c/p>\n\u003cul>\n\u003cli>App launches from \u003ccode>npm run dev\u003c/code>.\u003c/li>\n\u003cli>Window is transparent and always-on-top.\u003c/li>\n\u003cli>Pet can be moved or positioned.\u003c/li>\n\u003cli>Tray can hide/show/exit.\u003c/li>\n\u003cli>First short recording is possible.\u003c/li>\n\u003c/ul>\n\u003ch3>M2: Pet Runtime\u003c/h3>\n\u003cp>Goal: Make the seal feel alive.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Role\u003c/th>\u003cth>Responsibilities\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Owner\u003c/td>\u003ctd>Verify behavior feels cute and non-annoying\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Planning\u003c/td>\u003ctd>Specify finite state machine, priority order, mood/energy/affection/hunger values, and event effects\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Client\u003c/td>\u003ctd>Implement state machine, animation player, timers, pointer reactions, position save, low-FPS idle mode\u003c/td>\u003c/tr>\u003ctr>\u003ctd>AI\u003c/td>\u003ctd>Define how \u003ccode>Talking\u003c/code> state will interrupt or queue with other pet states\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art\u003c/td>\u003ctd>Provide or specify placeholder frames for idle, walk, sleep, happy, annoyed, dragged, poke\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Release\u003c/td>\u003ctd>Add runtime logging for state transitions and crash/debug collection basics\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QA\u003c/td>\u003ctd>Run M2 QA checklist, verify state transitions, click/drag behavior, persistence, build health, and flag multi-monitor checks for owner confirmation if needed\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Exit checklist:\u003c/p>\n\u003cul>\n\u003cli>Idle, walk, sleep, dragged, happy, annoyed, and poke states work.\u003c/li>\n\u003cli>State transitions do not get stuck.\u003c/li>\n\u003cli>Pet position and basic values persist across restart.\u003c/li>\n\u003cli>Idle performance is acceptable for a prototype.\u003c/li>\n\u003c/ul>\n\u003ch3>M3: Character Pack + Seal Art Pass\u003c/h3>\n\u003cp>Goal: Make the default seal and future character swaps data-driven.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Role\u003c/th>\u003cth>Responsibilities\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Owner\u003c/td>\u003ctd>Approve first white baby seal direction and define emergency art cut if final art is late\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Planning\u003c/td>\u003ctd>Define character metadata fields, fallback behavior for missing animations, and unlock assumptions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Client\u003c/td>\u003ctd>Implement manifest loading, sprite sheet metadata, animation fallback, character selection stub\u003c/td>\u003c/tr>\u003ctr>\u003ctd>AI\u003c/td>\u003ctd>Attach personality metadata to character pack and define bilingual persona fields\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art\u003c/td>\u003ctd>Deliver white baby seal art spec, first sprite pass, palette, frame dimensions, and animation naming\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Release\u003c/td>\u003ctd>Validate asset folder structure, missing file behavior, and package inclusion rules\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QA\u003c/td>\u003ctd>Run M3 QA checklist, test manifest loading/fallback, verify no crash on missing assets, and inspect seal readability against backgrounds\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Exit checklist:\u003c/p>\n\u003cul>\n\u003cli>Default seal is loaded from a manifest.\u003c/li>\n\u003cli>Adding/replacing a character pack does not require code changes.\u003c/li>\n\u003cli>Missing animations fall back gracefully.\u003c/li>\n\u003cli>Seal reads clearly on light and dark desktops.\u003c/li>\n\u003c/ul>\n\u003ch3>M4: Photo-To-Pixel Customization\u003c/h3>\n\u003cp>Goal: Prove the customization hook with a deterministic pixel template generator before overbuilding AI generation.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Role\u003c/th>\u003cth>Responsibilities\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Owner\u003c/td>\u003ctd>Keep the promise framed as template-based pixel character generation, not exact likeness\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Planning\u003c/td>\u003ctd>Define the user flow: import, generate from template, preview, save, select\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Client\u003c/td>\u003ctd>Implement image import, local feature/palette sampling, built-in template generation, preview, and custom character save\u003c/td>\u003c/tr>\u003ctr>\u003ctd>AI\u003c/td>\u003ctd>Evaluate whether any local model is needed; keep non-AI template path as the default\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art\u003c/td>\u003ctd>Provide pixel character templates, palette rules, outline rules, and QA criteria for generated output; treat the seal as default placeholder art only\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Release\u003c/td>\u003ctd>Check local-only privacy wording and make sure imported assets save in user data, not app install files\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QA\u003c/td>\u003ctd>Run M4 QA checklist with test images, verify import/crop/pixelize/save/select, and test invalid image handling\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Exit checklist:\u003c/p>\n\u003cul>\n\u003cli>User can import a test image.\u003c/li>\n\u003cli>User can preview a generated template pixel character.\u003c/li>\n\u003cli>Result can be saved and selected.\u003c/li>\n\u003cli>Bad images fail gracefully with manual adjustment.\u003c/li>\n\u003c/ul>\n\u003ch3>M5: AI + Scene Interaction\u003c/h3>\n\u003cp>Goal: Add companionship and simple desktop objects without making AI the core dependency.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Role\u003c/th>\u003cth>Responsibilities\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Owner\u003c/td>\u003ctd>Verify chat and props support the seal fantasy in
