003ctr>\u003ctd>4\u003c/td>\u003ctd>Sleep\u003c/td>\u003ctd>After inactivity, character switches to sleep/rest frame set\u003c/td>\u003ctd>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>5\u003c/td>\u003ctd>Poke/happy\u003c/td>\u003ctd>Clicking character triggers happy/poke reaction frames\u003c/td>\u003ctd>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>6\u003c/td>\u003ctd>Outfit\u003c/td>\u003ctd>White shirt and blue jeans remain readable at desktop size\u003c/td>\u003ctd>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>7\u003c/td>\u003ctd>No old UI\u003c/td>\u003ctd>Import/save panel is gone\u003c/td>\u003ctd>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>8\u003c/td>\u003ctd>No debug obstruction\u003c/td>\u003ctd>Bottom debug label does not cover the pet\u003c/td>\u003ctd>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>9\u003c/td>\u003ctd>Drag\u003c/td>\u003ctd>Dragging still works across desktop and does not break animation after release\u003c/td>\u003ctd>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>10\u003c/td>\u003ctd>Restart\u003c/td>\u003ctd>Relaunch keeps the animated character as default active character\u003c/td>\u003ctd>\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Fixed During QA\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Issue\u003c/th>\u003cth>Fix\u003c/th>\u003cth>Verified\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Screenshot showed no character\u003c/td>\u003ctd>Renderer now loads data URL frames through \u003ccode>Image()\u003c/code> before creating Pixi textures\u003c/td>\u003ctd>Electron screenshot QA pass\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Debug state label covered character\u003c/td>\u003ctd>\u003ccode>#state-label\u003c/code> hidden in runtime CSS\u003c/td>\u003ctd>Electron screenshot QA pass\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Deferred Follow-Up\u003c/h3>\n\u003cul>\n\u003cli>Generate dedicated \u003ccode>annoyed\u003c/code> frames.\u003c/li>\n\u003cli>Generate dedicated \u003ccode>dragged\u003c/code> frames if the drag feedback feels too simple.\u003c/li>\n\u003cli>Turn local screenshot QA harness into a committed automated QA script.\u003c/li>\n\u003cli>Add owner-facing animation QA checklist to the release candidate build process.\u003c/li>\n\u003c/ul>"}]},{"id":"tech","label":"技术/流程","files":["product-inputs.md","mvp-roadmap.md","project-rules.md","technical-direction.md","team-and-agents.md","photo-commission-character-pipeline.md","art-and-ai-pipeline.md"],"docs":[{"file":"docs/project-plan/product-inputs.md","exists":true,"updatedAt":"2026-07-08T14:30:50.111Z","html":"\u003ch2>Product Inputs\u003c/h2>\n\u003ch3>Current Decisions\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Item\u003c/th>\u003cth>Decision\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Temporary project name\u003c/td>\u003ctd>Project Seal\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Current use target\u003c/td>\u003ctd>Personal-use desktop pet, not public Steam sale\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Default pet direction\u003c/td>\u003ctd>White baby seal remains the mascot placeholder / first-party character direction\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Current active character\u003c/td>\u003ctd>\u003ccode>photo_001_travel_girl\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Language scope\u003c/td>\u003ctd>Chinese-first personal use, bilingual-ready where UI text is centralized\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Monetization\u003c/td>\u003ctd>None for current scope\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Distribution target\u003c/td>\u003ctd>Local Windows build for personal use and iteration\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Visual style\u003c/td>\u003ctd>Cute Q-version pixel art with desktop-pet readable proportions\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Product Position\u003c/h3>\n\u003cp>Project Seal is now a personal-use, offline-first pixel desktop pet. The product should feel closer to a modern, private, lightweight QQ Pet-style companion than a commercial Steam SKU.\u003c/p>\n\u003cp>The core value is not store readiness. The core value is a cute pet that lives on the desktop, exposes QQ Pet-like needs only when hovered, reacts to interaction, and can later imitate the speaking style of an imported WeChat chat-history subject for private conversation.\u003c/p>\n\u003ch3>Immediate Implications\u003c/h3>\n\u003cul>\n\u003cli>Remove Steam sale, USD 1 pricing, store capsule, and public launch assumptions from active planning.\u003c/li>\n\u003cli>Keep Windows/Electron/PixiJS as the active runtime stack.\u003c/li>\n\u003cli>Preserve the existing art pipeline, but route all Meowa prompts through the unified Art Director.\u003c/li>\n\u003cli>Confirm final pixel proportions before commissioning UI art.\u003c/li>\n\u003cli>Design UI as a small pixel UI kit that matches the pet scale, not a normal app panel.\u003c/li>\n\u003cli>Runtime should show only the pet by default; hover reveals health, mood, hunger, and money.\u003c/li>\n\u003cli>Double-click should open a compact conversation box.\u003c/li>\n\u003cli>WeChat chat imports are personal data and must remain local/private unless the owner explicitly exports them.\u003c/li>\n\u003c/ul>"},{"file":"docs/project-plan/mvp-roadmap.md","exists":true,"updatedAt":"2026-07-08T14:30:50.115Z","html":"\u003ch2>MVP Roadmap\u003c/h2>\n\u003ch3>Product Goal\u003c/h3>\n\u003cp>Build Project Seal as a personal-use Windows desktop pet. The active direction is no longer Steam sale. The product should behave like a modern pixel QQ Pet: quiet by default, status visible on hover, core care values, and optional personal conversation through a double-click chat box.\u003c/p>\n\u003ch3>Core Loop\u003c/h3>\n\u003cp>1. Pet idles on the desktop with no persistent UI.\u003c/p>\n\u003cp>2. Mouse hover shows health, mood, hunger, and money.\u003c/p>\n\u003cp>3. User drags, pokes, feeds, plays, rests, or opens chat.\u003c/p>\n\u003cp>4. Pet reacts with animation, expression, and compact pixel UI feedback.\u003c/p>\n\u003cp>5. Health, mood, hunger, and money change.\u003c/p>\n\u003cp>6. Double-click opens conversation with fallback/persona replies.\u003c/p>\n\u003cp>7. Pet returns to quiet desktop presence.\u003c/p>\n\u003ch3>Updated MVP Plan\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Milestone\u003c/th>\u003cth>Goal\u003c/th>\u003cth>Deliverables\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>M0\u003c/td>\u003ctd>Product lock\u003c/td>\u003ctd>Original lock complete; current target refreshed to personal use\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M1\u003c/td>\u003ctd>Desktop foundation\u003c/td>\u003ctd>Transparent window, draggable pet, tray exit/settings, renderer proof\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M2\u003c/td>\u003ctd>Pet runtime\u003c/td>\u003ctd>State machine, animation player, drag/poke, cross-monitor behavior, save\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M3\u003c/td>\u003ctd>Character packs\u003c/td>\u003ctd>Manifest-driven character directory format and fallback behavior\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M4\u003c/td>\u003ctd>Photo commission pipeline\u003c/td>\u003ctd>Owner-provided photo to art-directed Meowa character pack workflow\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M5\u003c/td>\u003ctd>Character animation MVP\u003c/td>\u003ctd>Meowa cleanup, idle/walk/sleep/happy frames, state playback, screenshot QA\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M6\u003c/td>\u003ctd>Personal care + hover UI\u003c/td>\u003ctd>Health/mood/hunger/money, hover-only status UI, local value persistence\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M7\u003c/td>\u003ctd>WeChat persona chat slice\u003c/td>\u003ctd>Double-click chat box, WeChat import plan/parser, local style profile prototype\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M8\u003c/td>\u003ctd>Personal build polish\u003c/td>\u003ctd>Settings, data hygiene, local backup/export, long-session stability\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Acceptance Criteria\u003c/h3>\n\u003cp>The personal-use MVP is acceptable when:\u003c/p>\n\u003cul>\n\u003cli>The pet can run for two hours without crashing.\u003c/li>\n\u003cli>The app can be closed clearly from tray/menu.\u003c/li>\n\u003cli>The pet does not block normal desktop use by default.\u003c/li>\n\u003cli>Only the pet is visible during normal idle state.\u003c/li>\n\u003cli>Hover shows health, mood, hunger, and money clearly.\u003c/li>\n\u003cli>Double-click opens a compact conversation box.\u003c/li>\n\u003cli>Idle CPU/GPU usage is low enough for everyday background use.\u003c/li>\n\u003cli>At least four visible character animation state groups are implemented: idle, walk, sleep, and happy/poke.\u003c/li>\n\u003cli>Owner-provided photos can become usable commissioned pixel character packs.\u003c/li>\n\u003cli>WeChat chat records are processed locally or represented through safe local fixtures only.\u003c/li>\n\u003cli>No raw chat logs, private photos, or API keys are committed.\u003c/li>\n\u003c/ul>\n\u003ch3>First Personal Build Feature Set\u003c/h3>\n\u003cp>Keep:\u003c/p>\n\u003cul>\n\u003cli>Pixel desktop pet.\u003c/li>\n\u003cli>Current animated character pack.\u003c/li>\n\u003cli>Default white seal direction as mascot/fallback.\u003c/li>\n\u003cli>Health, mood, hunger, money values.\u003c/li>\n\u003cli>Hover-only status UI.\u003c/li>\n\u003cli>Double-click chat shell.\u003c/li>\n\u003cli>Local save/settings.\u003c/li>\n\u003cli>Local/fallback persona replies.\u003c/li>\n\u003cli>Art-directed Meowa UI kit after pixel scale lock.\u003c/li>\n\u003c/ul>\n\u003cp>Cut if timeline slips:\u003c/p>\n\u003cul>\n\u003cli>Dedicated annoyed/dragged art.\u003c/li>\n\u003cli>Full WeChat style distillation.\u003c/li>\n\u003cli>Complex earning economy.\u003c/li>\n\u003cli>Multiple pets.\u003c/li>\n\u003cli>Voice features.\u003c/li>\n\u003cli>Public release packaging.\u003c/li>\n\u003c/ul>\n\u003ch3>State Machine\u003c/h3>\n\u003cp>Use a finite state machine for the first version.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>State\u003c/th>\u003cth>Trigger\u003c/th>\u003cth>Notes\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Idle\u003c/td>\u003ctd>Default fallback\u003c/td>\u003ctd>Can randomly branch into walk, blink, sit, or sleep\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Walk\u003c/td>\u003ctd>Idle timer or scene target\u003c/td>\u003ctd>Low priority, interruptible\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Sleep\u003c/td>\u003ctd>Low activity or rest action\u003c/td>\u003ctd>Click can wake the pet\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Dragged\u003c/td>\u003ctd>User drags pet\u003c/td>\u003ctd>Highest priority\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Happy\u003c/td>\u003ctd>Positive interaction\u003c/td>\u003ctd>Short duration reaction\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Annoyed\u003c/td>\u003ctd>Repeated poke or bad timing\u003c/td>\u003ctd>Keep cute, not hostile\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Hungry\u003c/td>\u003ctd>Hunger low\u003c/td>\u003ctd>Show hover warning / request food\u003c/td>\u003c/tr>\u003ctr>\u003ctd>LowHealth\u003c/td>\u003ctd>Health low\u003c/td>\u003ctd>Planned warning state\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Eating\u003c/td>\u003ctd>Food prop used\u003c/td>\u003ctd>Changes health/mood/hunger/money\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Playing\u003c/td>\u003ctd>Toy prop used\u003c/td>\u003ctd>Changes mood/hunger/money\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Chatting\u003c/td>\u003ctd>User double-clicks pet\u003c/td>\u003ctd>Opens conversation box and pauses other low-priority behavior\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Priority order:\u003c/p>\n\u003cp>1. Dragged.\u003c/p>\n\u003cp>2. Chatting.\u003c/p>\n\u003cp>3. Eating or Playing.\u003c/p>\n\u003cp>4. LowHealth or Hungry.\u003c/p>\n\u003cp>5. Happy or Annoyed.\u003c/p>\n\u003cp>6. Sleep.\u003c/p>\n\u003cp>7. Walk.\u003c/p>\n\u003cp>8. Idle.\u003c/p>\n\u003ch3>Data Schemas\u003c/h3>\n\u003cp>Pet save:\u003c/p>\n\u003cpre>\u003ccode>{\n  &quot;activeCharacterId&quot;: &quot;photo_001_travel_girl&quot;,\n  &quot;health&quot;: 80,\n  &quot;mood&quot;: 70,\n  &quot;hunger&quot;: 40,\n  &quot;money&quot;: 100,\n  &quot;position&quot;: { &quot;x&quot;: 1200, &quot;y&quot;: 700 },\n  &quot;lastPlayedAt&quot;: &quot;2026-07-08T10:00:00+08:00&quot;,\n  &quot;activePersonaProfileId&quot;: null\n}\u003c/code>\u003c/pre>\n\u003cp>Persona style profile:\u003c/p>\n\u003cpre>\u003ccode>{\n  &quot;id&quot;: &quot;wechat_persona_001&quot;,\n  &quot;sourceType&quot;: &quot;wechat_export&quot;,\n  &quot;displayName&quot;: &quot;Local Persona&quot;,\n  &quot;styleSummary&quot;: {\n    &quot;tone&quot;: [&quot;concise&quot;, &quot;warm&quot;],\n    &quot;replyLength&quot;: &quot;short&quot;,\n    &quot;emojiHabit&quot;: &quot;light&quot;,\n    &quot;punctuation&quot;: &quot;casual&quot;\n  },\n  &quot;safety&quot;: {\n    &quot;rawChatCommitted&quot;: false,\n    &quot;localOnly&quot;: true\n  }\n}\u003c/code>\u003c/pre>\n\u003ch3>Current Milestone Status\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Milestone\u003c/th>\u003cth>Status\u003c/th>\u003cth>Notes\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>M0 Product Lock\u003c/td>\u003ctd>Complete / superseded\u003c/td>\u003ctd>Original Steam/USD assumptions replaced by personal-use direction\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M1 Desktop Shell\u003c/td>\u003ctd>Complete\u003c/td>\u003ctd>Transparent draggable Electron shell established\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M2 Pet Runtime\u003c/td>\u003ctd>Complete\u003c/td>\u003ctd>State machine, drag/poke, cross-screen safety, and runtime save behavior established\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M3 Character Packs\u003c/td>\u003ctd>Complete\u003c/td>\u003ctd>Manifest-driven character packs and fallback behavior established\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M4 Photo Commission Pipeline\u003c/td>\u003ctd>Complete\u003c/td>\u003ctd>Owner-directed commissioned character packs established\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M5 Character Animation MVP\u003c/td>\u003ctd>Complete pending owner acceptance\u003c/td>\u003ctd>Meowa-assisted animation frames and screenshot QA\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M6 Personal Care + Hover UI\u003c/td>\u003ctd>Not started\u003c/td>\u003ctd>Next recommended milestone\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M7 WeChat Persona Chat Slice\u003c/td>\u003ctd>Not started\u003c/td>\u003ctd>Follows M6\u003c/td>\u003c/tr>\u003ctr>\u003ctd>M8 Personal Build Polish\u003c/td>\u003ctd>Not started\u003c/td>\u003ctd>Local stability and data hygiene\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>"},{"file":"docs/project-plan/project-rules.md","exists":true,"updatedAt":"2026-07-08T14:40:07.253Z","html":"\u003ch2>Project Rules\u003c/h2>\n\u003cp>These rules are mandatory for Project Seal delivery work.\u003c/p>\n\u003ch3>Git Commit Rule\u003c/h3>\n\u003cp>When an agent changes any non-ignored project file, the change must be committed to git and pushed to the tracked remote branch after the relevant verification passes.\u003c/p>\n\u003cp>Applies to:\u003c/p>\n\u003cul>\n\u003cli>Runtime source code.\u003c/li>\n\u003cli>Project documentation.\u003c/li>\n\u003cli>Character packs and runtime art assets.\u003c/li>\n\u003cli>Non-ignored generated Meowa outputs.\u003c/li>\n\u003cli>QA reports and milestone acceptance documents.\u003c/li>\n\u003c/ul>\n\u003cp>Does not apply to:\u003c/p>\n\u003cul>\n\u003cli>Files ignored by \u003ccode>.gitignore\u003c/code>.\u003c/li>\n\u003cli>Raw private owner photos under ignored intake folders.\u003c/li>\n\u003cli>API keys, local secrets, local caches, \u003ccode>node_modules\u003c/code>, build output, or temporary QA output.\u003c/li>\n\u003c/ul>\n\u003cp>Commit rules:\u003c/p>\n\u003cul>\n\u003cli>Check \u003ccode>git status\u003c/code> before and after the work.\u003c/li>\n\u003cli>Do not commit secrets or ignored private source photos.\u003c/li>\n\u003cli>Include all non-ignored files that belong to the completed delivery.\u003c/li>\n\u003cli>If unrelated user work is present, do not overwrite it; either leave it untouched or call it out before committing.\u003c/li>\n\u003cli>Use a concise commit message that names the milestone or delivery.\u003c/li>\n\u003cli>Push the commit to the tracked remote branch immediately after a successful commit.\u003c/li>\n\u003cli>Stop before push only if secrets, private raw photos, unrelated user work, merge conflicts, authentication failure, or remote rejection is detected.\u003c/li>\n\u003cli>After push, confirm \u003ccode>git status -sb\u003c/code> shows the local branch is aligned with its remote tracking branch.\u003c/li>\n\u003c/ul>\n\u003ch3>Dashboard Update Rule\u003c/h3>\n\u003cp>The HTML dashboard is the primary project-management entry point.\u003c/p>\n\u003cp>When any milestone document, GDD, PRD, QA report, art asset, art metadata, or planning document changes, run:\u003c/p>\n\u003cpre>\u003ccode>npm.cmd run dashboard\u003c/code>\u003c/pre>\n\u003cp>This regenerates:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>docs/project-dashboard/index.html\u003c/code>\u003c/li>\n\u003cli>\u003ccode>docs/project-dashboard/art-assets-status.json\u003c/code>\u003c/li>\n\u003c/ul>\n\u003cp>The dashboard must be committed and pushed together with the underlying project change so the HTML view stays current.\u003c/p>\n\u003ch3>Meowa Art Direction Rule\u003c/h3>\n\u003cp>All Meowa art prompts must be created or approved by one unified Art Director role before generation.\u003c/p>\n\u003cp>The Art Director owns:\u003c/p>\n\u003cul>\n\u003cli>The project art bible and visual consistency.\u003c/li>\n\u003cli>Character trait extraction from owner-provided references.\u003c/li>\n\u003cli>Positive prompts, negative prompts, and prompt variants.\u003c/li>\n\u003cli>Outfit, silhouette, palette, and proportion consistency.\u003c/li>\n\u003cli>Selection criteria for candidates before implementation.\u003c/li>\n\u003cli>Recording prompt intent, Meowa job IDs, and remaining credit after generation.\u003c/li>\n\u003c/ul>\n\u003cp>Implementation agents must not casually rewrite Meowa prompts. They can request a prompt from the Art Director, run the approved prompt, process outputs, and implement the selected assets.\u003c/p>\n\u003cp>For every Meowa generation batch, record:\u003c/p>\n\u003cul>\n\u003cli>Source reference path.\u003c/li>\n\u003cli>Art Director brief or prompt summary.\u003c/li>\n\u003cli>Template/model used.\u003c/li>\n\u003cli>Job IDs.\u003c/li>\n\u003cli>Output paths.\u003c/li>\n\u003cli>Remaining Meowa credit.\u003c/li>\n\u003cli>Owner selection or rejection notes.\u003c/li>\n\u003c/ul>\n\u003ch3>Art QA Rule\u003c/h3>\n\u003cp>Any visual or animation change must run screenshot QA before handoff.\u003c/p>\n\u003cp>Required checks:\u003c/p>\n\u003cul>\n\u003cli>Build or prepare the exact renderer output being handed off.\u003c/li>\n\u003cli>Launch an Electron QA window or equivalent runtime preview.\u003c/li>\n\u003cli>Capture a screenshot.\u003c/li>\n\u003cli>Confirm the intended character is visible at runtime size.\u003c/li>\n\u003cli>Confirm key visual traits are visible.\u003c/li>\n\u003cli>Confirm no fallback character, old UI, or debug label is covering the pet.\u003c/li>\n\u003cli>Show or attach the screenshot before asking for owner acceptance.\u003c/li>\n\u003c/ul>"},{"file":"docs/project-plan/technical-direction.md","exists":true,"updatedAt":"2026-07-08T14:32:15.110Z","html":"\u003ch2>Technical Direction\u003c/h2>\n\u003ch3>Recommendation\u003c/h3>\n\u003cp>Use a desktop app stack for the personal-use MVP.\u003c/p>\n\u003cp>Recommended stack:\u003c/p>\n\u003cul>\n\u003cli>Client shell: Electron first, Tauri later if footprint becomes a major issue.\u003c/li>\n\u003cli>Renderer: PixiJS.\u003c/li>\n\u003cli>UI layer: lightweight DOM overlay or renderer-integrated pixel UI, depending on final scale.\u003c/li>\n\u003cli>App language: TypeScript.\u003c/li>\n\u003cli>Runtime state: lightweight event bus or Zustand-style store.\u003c/li>\n\u003cli>Data: JSON content definitions plus file-backed local saves.\u003c/li>\n\u003cli>Local AI/persona: local model adapter or deterministic fallback profile runtime.\u003c/li>\n\u003cli>Art pipeline: Meowa-assisted assets through unified Art Director prompts.\u003c/li>\n\u003c/ul>\n\u003ch3>Why Not Unity First\u003c/h3>\n\u003cp>Unity is strong for game scenes and animation tooling, but this project needs precise desktop behavior:\u003c/p>\n\u003cul>\n\u003cli>Transparent always-on-top windows.\u003c/li>\n\u003cli>Optional click-through.\u003c/li>\n\u003cli>Dragging a frameless character.\u003c/li>\n\u003cli>Tray menu and background runtime behavior.\u003c/li>\n\u003cli>Native settings and startup behavior.\u003c/li>\n\u003cli>Small hover UI around a desktop sprite.\u003c/li>\n\u003c/ul>\n\u003cp>These remain easier to productize in Electron/Tauri/native desktop code than in a conventional game engine.\u003c/p>\n\u003ch3>Architecture\u003c/h3>\n\u003cpre>\u003ccode>desktop-shell\n  main-process\n    window-manager\n    tray-menu\n    settings\n    local-data-manager\n    ai-service-controller\n  renderer\n    pet-runtime\n    hover-status-ui\n    chat-box-ui\n    scene-runtime\n    interaction-layer\n  shared\n    content-schema\n    save-schema\n    persona-schema\n    event-bus\n    asset-loader\n    privacy-guards\u003c/code>\u003c/pre>\n\u003ch3>Core Runtime Modules\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Module\u003c/th>\u003cth>Responsibility\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Window Manager\u003c/td>\u003ctd>Transparent window, always-on-top, click-through toggle, monitor bounds\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Pet Runtime\u003c/td>\u003ctd>State machine, animation playback, health/mood/hunger/money values\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Hover Status UI\u003c/td>\u003ctd>Displays core values only while mouse is over the pet\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Chat Box UI\u003c/td>\u003ctd>Opens on double-click and hosts local/fallback conversation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Scene Runtime\u003c/td>\u003ctd>Food, toy, bed, and other small care interactions\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Asset Loader\u003c/td>\u003ctd>Default assets, character packs, Meowa UI kit assets\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Persona Manager\u003c/td>\u003ctd>Stores local style profiles and connects them to chat runtime\u003c/td>\u003c/tr>\u003ctr>\u003ctd>WeChat Importer\u003c/td>\u003ctd>Parses owner-provided WeChat exports into local structured records\u003c/td>\u003c/tr>\u003ctr>\u003ctd>AI Service Controller\u003c/td>\u003ctd>Starts/stops local model process and handles chat requests when enabled\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Save System\u003c/td>\u003ctd>Settings, pet profile, active character, core values, persona selection\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Privacy Guard\u003c/td>\u003ctd>Keeps raw private photos, chat logs, and API keys out of git and external calls\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Window And UI Modes\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Mode\u003c/th>\u003cth>Behavior\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Normal\u003c/td>\u003ctd>Only pet sprite is visible; pointer events go to pet as needed\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Hover\u003c/td>\u003ctd>Compact pixel status UI appears near pet\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Drag\u003c/td>\u003ctd>Pointer is captured; pet follows cursor; state switches to \u003ccode>Dragged\u003c/code>\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Chat\u003c/td>\u003ctd>Double-click opens compact conversation box; low-priority pet states pause\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Lock\u003c/td>\u003ctd>Pet ignores interaction and stays out of the user's way\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Edit Scene\u003c/td>\u003ctd>Click-through is disabled; props can be moved or configured\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Data Model Changes\u003c/h3>\n\u003cp>Active pet values:\u003c/p>\n\u003cpre>\u003ccode>{\n  &quot;health&quot;: 80,\n  &quot;mood&quot;: 70,\n  &quot;hunger&quot;: 40,\n  &quot;money&quot;: 100\n}\u003c/code>\u003c/pre>\n\u003cp>Persona profile:\u003c/p>\n\u003cpre>\u003ccode>{\n  &quot;id&quot;: &quot;wechat_persona_001&quot;,\n  &quot;sourceType&quot;: &quot;wechat_export&quot;,\n  &quot;localOnly&quot;: true,\n  &quot;styleSummary&quot;: {\n    &quot;tone&quot;: [],\n    &quot;phraseHabits&quot;: [],\n    &quot;replyLength&quot;: &quot;short&quot;,\n    &quot;emojiHabit&quot;: &quot;light&quot;\n  }\n}\u003c/code>\u003c/pre>\n\u003ch3>Technical Risks\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Risk\u003c/th>\u003cth>Mitigation\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Transparent window behavior differs across monitors/DPI\u003c/td>\u003ctd>Windows-first QA and bounds correction\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Hover UI mis-scales against pet art\u003c/td>\u003ctd>Lock pixel proportions before Meowa UI kit generation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Chat records contain private data\u003c/td>\u003ctd>Keep raw imports ignored/local; add privacy guard checks\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local model package becomes too large\u003c/td>\u003ctd>Start with fallback/rules persona, add local model later\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Style imitation feels wrong or unsafe\u003c/td>\u003ctd>Store owner-approved persona profiles and avoid exact identity claims\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Desktop pet consumes too much CPU/GPU\u003c/td>\u003ctd>Fixed low FPS idle mode, animation throttling, sleep mode\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Technical MVP Cut\u003c/h3>\n\u003cp>Must have next:\u003c/p>\n\u003cul>\n\u003cli>Health/mood/hunger/money values.\u003c/li>\n\u003cli>Hover-only status UI.\u003c/li>\n\u003cli>Double-click chat box shell.\u003c/li>\n\u003cli>Local save of values and UI state.\u003c/li>\n\u003cli>Pixel proportion lock document.\u003c/li>\n\u003cli>Art Director Meowa UI kit prompt brief.\u003c/li>\n\u003c/ul>\n\u003cp>Defer:\u003c/p>\n\u003cul>\n\u003cli>Public packaging/store flow.\u003c/li>\n\u003cli>Full WeChat import UI.\u003c/li>\n\u003cli>Local LLM integration if fallback persona replies are enough for first slice.\u003c/li>\n\u003cli>Voice features.\u003c/li>\n\u003cli>Multi-pet runtime.\u003c/li>\n\u003cli>Complex economy.\u003c/li>\n\u003c/ul>\n\u003ch3>Updated Technical Task List\u003c/h3>\n\u003cp>1. Lock pet frame size, display scale, UI grid, and panel dimensions.\u003c/p>\n\u003cp>2. Define value schema for health, mood, hunger, and money.\u003c/p>\n\u003cp>3. Replace old value model in runtime/state save.\u003c/p>\n\u003cp>4. Implement hover detection and status UI visibility.\u003c/p>\n\u003cp>5. Implement double-click chat box shell.\u003c/p>\n\u003cp>6. Add local persona profile schema.\u003c/p>\n\u003cp>7. Design WeChat import parser interface and ignored raw-data location.\u003c/p>\n\u003cp>8. Add food/toy/bed value effects.\u003c/p>\n\u003cp>9. Generate Meowa pixel UI kit after Art Director prompt approval.\u003c/p>\n\u003cp>10. Run screenshot QA for hover UI and chat UI.\u003c/p>\n\u003cp>11. Run multi-monitor, DPI, idle, and privacy-file checks.\u003c/p>"},{"file":"docs/project-plan/team-and-agents.md","exists":true,"updatedAt":"2026-07-05T16:04:34.921Z","html":"\u003ch2>Team And Agents\u003c/h2>\n\u003ch3>Operating Model\u003c/h3>\n\u003cp>The project should use one main owner plus six focused subagents.\u003c/p>\n\u003cp>The main owner is responsible for product direction, technical decisions, task splitting, final review, and integration. Subagents should receive concrete tasks with clear output requirements. They can inspect files, run builds, run tests, start local services, and produce implementation or research output when instructed, but they are not a replacement for project ownership.\u003c/p>\n\u003ch3>Recommended Subagents\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\u003cthead>\u003ctr>\u003cth>Subagent\u003c/th>\u003cth>Primary Responsibility\u003c/th>\u003cth>Typical Outputs\u003c/th>\u003c/tr>\u003c/thead>\u003ctbody>\u003ctr>\u003ctd>Planning + Gameplay Programmer\u003c/td>\u003ctd>Core loop, interaction design, pet state machine, content data\u003c/td>\u003ctd>Feature specs, event tables, state charts, balance notes, simple scripts\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Desktop Client Engineer\u003c/td>\u003ctd>Transparent desktop window, drag/drop, tray, renderer, packaging\u003c/td>\u003ctd>Client architecture, platform adapters, runtime code, build scripts\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Local AI Engineer\u003c/td>\u003ctd>Local LLM integration, prompt/persona system, model packaging\u003c/td>\u003ctd>Inference service, model selection, memory/performance budget, fallback modes\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Art Pipeline Lead\u003c/td>\u003ctd>Pixel character specs, animation lists, import pipeline, generated asset QA\u003c/td>\u003ctd>Sprite specs, art bible, ComfyUI workflow, asset validation\u003c/td>\u003c/tr>\u003ctr>\u003ctd>Build + Release Engineer\u003c/td>\u003ctd>Steamworks, installer, save data, crash logs, update/release flow\u003c/td>\u003ctd>Release checklist, store build, CI, packaging and smoke tests\u003c/td>\u003c/tr>\u003ctr>\u003ctd>QA Tester\u003c/td>\u003ctd>Milestone verification, regression checks, owner-facing QA reports\u003c/td>\u003ctd>QA pass/fail report, bug list, reproduction steps, milestone acceptance recommendation\u003c/td>\u003c/tr>\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3>Unified Art Director Rule\u003c/h3>\n\u003cp>All Meowa prompts must come from a single Art Director voice before generation. The Art Pipeline Lead acts as this Art Director unless the owner assigns a separate person. Other subagents may run approved Meowa jobs and implement assets, but they must not invent or casually modify art prompts without Art Director approval.\u003c/p>\n\u003cp>See project-rules.md for the mandatory prompt, credit, and screenshot QA rules.\u003c/p>\n\u003ch3>Command Path\u003c/h3>\n\u003cp>All subagent instructions should go through the main owner. This keeps the product coherent and prevents duplicate or conflicting work.\u003c/p>\n\u003cp>Subagents can run processes when the task requires it, such as:\u003c/p>\n\u003cul>\n\u003cli>Starting the app locally for verification.\u003c/li>\n\u003cli>Running tests and builds.\u003c/li>\n\u003cli>Running asset conversion scripts.\u003c/li>\n\u003cli>Running local inference benchmarks.\u003c/li>\n\u003cli>Inspecting Steam packaging outputs.\u003c/li>\n\u003c/ul>\n\u003cp>Long-running autonomous work should be avoided unless the task has clear stop conditions and a review checkpoint.\u003c/p>\n\u003ch3>QA Gate\u003c/h3>\n\u003cp>Every milestone must pass QA Tester review before owner acceptance.\u003c/p>\n\u003cp>Flow:\u003c/p>\n\u003cp>1. Owner marks implementation ready for QA.\u003c/p>\n\u003cp>2. QA Tester runs the relevant checklist from \u003ccode>milestone-qa-checklists.md\u003c/code>.\u003c/p>\n\u003cp>3. QA Tester reports:\u003c/p>\n\u003cul>\n\u003cli>Passed checks.\u003c/li>\n\u003cli>Failed checks.\u003c/li>\n\u003cli>Reproduction steps.\u003c/li>\n\u003cli>Severity: blocker, major, or minor.\u003c/li>\n\u003cli>Recommendation: accept, accept with tracked issues, or reject.\u003c/li>\n\u003c/ul>\n\u003cp>4. Owner reviews the QA Tester report and performs final acceptance.\u003c/p>\n\u003cp>The QA Tester can run processes such as typecheck, build, dev launch, smoke checks, and log inspection. Visual or hardware-dependent checks, such as mixed-resolution multi-monitor movement, should be marked as requiring owner confirmation when the subagent cannot directly observe them.\u003c/p>\n\u003ch3>Initial Staffing Priority\u003c/h3>\n\u003cp>For the first six weeks, the highest leverage setup is:\u003c/p>\n\u003cp>1. Main owner.\u003c/p>\n\u003cp>2. One planning/gameplay hybrid.\u003c/p>\n\u003cp>3. One desktop client engineer.\u003c/p>\n\u003cp>4. One art pipeline lead.\u003c/p>\n\u003cp>5. One QA tester.\u003c/p>\n\u003cp>The local AI and release roles can start as part-time subagent responsibilities until the core desktop pet loop is stable.\u003c/p>"},{"file":"docs/project-plan/photo-commission-character-pipeline.md","exists":true,"updatedAt":"2026-07-05T16:04:34.926Z","html":"\u003ch2>Photo Commission Character Pipeline\u003c/h2>\n\u003ch3>Product Direction Change\u003c/h3>\n\u003cp>Project Seal no longer promises real-time local photo-to-pixel customization for MVP.\u003c/p>\n\u003cp>New direction:\u003c/p>\n\u003cul>\n\u003cli>The owner provides a photo.\u003c/li>\n\u003cli>Art generation creates several pixel character style candidates.\u003c/li>\n\u003cli>The owner selects or approves one direction.\u003c/li>\n\u003cli>The selected result is packaged as a normal character pack.\u003c/li>\n\u003cli>The app loads that character pack like any other skin/character.\u003c/li>\n\u003c/ul>\n\u003cp>This is a production workflow, not an end-user live editor.\u003c/p>\n\u003ch3>Why This Replaces The Old M4\u003c/h3>\n\u003cp>The previous template generator produced low-quality procedural placeholders. It is removed from the product promise for now.\u003c/p>\n\u003cp>The new MVP promise is:\u003c/p>\n\u003cul>\n\u003cli>Higher quality art-directed pixel characters.\u003c/li>\n\u003cli>Repeatable production steps.\u003c/li>\n\u003cli>Easier QA and iteration.\u003c/li>\n\u003cli>No need to solve live identity extraction, segmentation, or editable outfit generation in the client.\u003c/li>\n\u003c/ul>\n\u003ch3>Standard Intake\u003c/h3>\n\u003cp>For each user photo, create:\u003c/p>\n\u003cpre>\u003ccode>assets/references/photo-inputs/photo-XXX.png\nassets/references/meowa/photoXXX/photoXXX_candidates/sprite_pack_preview.png\nassets/characters/photo_XXX_&lt;short_name&gt;/idle-source.png\nassets/characters/photo_XXX_&lt;short_name&gt;/idle.png\nassets/characters/photo_XXX_&lt;short_name&gt;/manifest.json\nassets/characters/photo_XXX_&lt;short_name&gt;/art-metadata.json\u003c/code>\u003c/pre>\n\u003ch3>Unified Art Director Gate\u003c/h3>\n\u003cp>Before any Meowa job is run, the Art Director must generate or approve the prompt. The implementation agent records the approved brief, job IDs, output paths, owner selection, and remaining Meowa credit. No ad hoc prompt rewrites are allowed during implementation unless they go back through the Art Director.\u003c/p>\n\u003ch3>Art Director Brief Template\u003c/h3>\n\u003cp>Extract 5-8 recognizable visual traits from the photo:\u003c/p>\n\u003cul>\n\u003cli>Hair color and silhouette.\u003c/li>\n\u003cli>Hat/headwear.\u003c/li>\n\u003cli>Glasses or face accessory.\u003c/li>\n\u003cli>Outerwear.\u003c/li>\n\u003cli>Inner clothing color.\u003c/li>\n\u003cli>Shoes or lower outfit.\u003c/li>\n\u003cli>Pose or attitude.\u003c/li>\n\u003cli>Any strong scene/personality cue.\u003c/li>\n\u003c/ul>\n\u003cp>Generate a candidate sheet first:\u003c/p>\n\u003cul>\n\u003cli>2-6 original chibi pixel sprites, depending on Meowa template count.\u003c/li>\n\u003cli>Same person, different pixel style interpretations.\u003c/li>\n\u003cli>Full body.\u003c/li>\n\u003cli>Plain background.\u003c/li>\n\u003cli>No text or labels.\u003c/li>\n\u003cli>Strong readable silhouette.\u003c/li>\n\u003cli>Keep recognizable traits, but avoid realism.\u003c/li>\n\u003c/ul>\n\u003cp>Then generate the selected/strongest idle sprite:\u003c/p>\n\u003cul>\n\u003cli>Single full-body sprite.\u003c/li>\n\u003cli>Transparent final PNG.\u003c/li>\n\u003cli>48x64 runtime-normalized asset for the current renderer.\u003c/li>\n\u003cli>Keep idle pose simple enough for later animation.\u003c/li>\n\u003c/ul>\n\u003ch3>Prompt Pattern\u003c/h3>\n\u003cpre>\u003ccode>Create a polished full-body pixel-art desktop pet idle sprite based on the reference photo.\nSingle character only, centered, no text, no labels, no watermark.\nPreserve these recognizable traits: &lt;traits&gt;.\nStyle: premium Japanese/Korean chibi pixel game sprite, crisp dark outline, clean pixel blocks, limited palette, hand-directed sprite art, designed for desktop pet use.\nAvoid realistic illustration, 3D render, blurry anti-pixel edges, excessive details, text, watermark.\u003c/code>\u003c/pre>\n\u003ch3>Meowa Integration Status\u003c/h3>\n\u003cul>\n\u003cli>API key: received from owner, not committed to repo.\u003c/li>\n\u003cli>Skill: installed at \u003ccode>.agents/skills/game-assets\u003c/code>.\u003c/li>\n\u003cli>Pixel character endpoint: \u003ccode>pixel-gen-run\u003c/code>, currently using template \u003ccode>large_3_4\u003c/code> for reference-photo chibi desktop pet candidates.\u003c/li>\n\u003cli>Credit query: \u003ccode>credits-balance\u003c/code>.\u003c/li>\n\u003cli>Current first implemented job: \u003ccode>photo_001_travel_girl\u003c/code>, Meowa job \u003ccode>f4c69c22-a86b-4ad6-862c-14c661c4173e\u003c/code>.\u003c/li>\n\u003c/ul>\n\u003cp>Standard command shape:\u003c/p>\n\u003cpre>\u003ccode>python .agents/skills/game-assets/meowart_api.py pixel-gen-run \\\n  --template-name large_3_4 \\\n  --requirement &quot;&lt;short art director brief&gt;&quot; \\\n  --reference-file assets/references/photo-inputs/photo-XXX-preview.png \\\n  --output-dir assets/references/meowa/photoXXX \\\n  --job-name photoXXX_candidates\u003c/code>\u003c/pre>\n\u003cp>After generation, keep the original Meowa sprite as \u003ccode>idle-source.png\u003c/code>, normalize the selected sprite to \u003ccode>48x64\u003c/code> as \u003ccode>idle.png\u003c/code>, and record the Meowa job id in \u003ccode>art-metadata.json\u003c/code>.\u003c/p>"},{"file":"docs/project-plan/art-and-ai-pipeline.md","exists":true,"updatedAt":"2026-07-08T14:32:15.123Z","html":"\u003ch2>Art And AI Pipeline\u003c/h2>\n\u003ch3>Art Direction\u003c/h3>\n\u003cp>Target style:\u003c/p>\n\u003cul>\n\u003cli>Cute Q-version proportions.\u003c/li>\n\u003cli>Pixel art with readable silhouette at small size.\u003c/li>\n\u003cli>Soft, friendly expressions.\u003c/li>\n\u003cli>High shareability for screenshots and short clips.\u003c/li>\n\u003cli>Low visual noise so the pet stays readable on busy desktops.\u003c/li>\n\u003c/ul>\n\u003ch3>Base Sprite Spec\u003c/h3>\n\u003cp>Recommended first spec:\u003c/p>\n\u003cul>\n\u003cli>Source canvas: 64x64 or 96x96 per frame.\u003c/li>\n\u003cli>Runtime canvas: allow 128x128 logical frame if the character needs extra effects or shadow.\u003c/li>\n\u003cli>Display scale: 2x to 4x depending on monitor DPI.\u003c/li>\n\u003cli>Frame rate: 8-12 FPS for most actions.\u003c/li>\n\u003cli>Direction: front and left/right for MVP.\u003c/li>\n\u003cli>Export: PNG sprite sheets plus JSON metadata.\u003c/li>\n\u003cli>Palette: 16-32 colors per character where possible.\u003c/li>\n\u003c/ul>\n\u003ch3>MVP Animation List\u003c/h3>\n\u003cp>Must have:\u003c/p>\n\u003cul>\n\u003cli>Idle.\u003c/li>\n\u003cli>Blink.\u003c/li>\n\u003cli>Walk.\u003c/li>\n\u003cli>Run.\u003c/li>\n\u003cli>Sit.\u003c/li>\n\u003cli>Sleep.\u003c/li>\n\u003cli>Happy/touched.\u003c/li>\n\u003cli>Annoyed.\u003c/li>\n\u003cli>Dragged.\u003c/li>\n\u003cli>Fall.\u003c/li>\n\u003cli>Land.\u003c/li>\n\u003cli>Poke.\u003c/li>\n\u003c/ul>\n\u003cp>Should have:\u003c/p>\n\u003cul>\n\u003cli>Eat/snack.\u003c/li>\n\u003cli>Sit.\u003c/li>\n\u003cli>Look around.\u003c/li>\n\u003cli>Wave.\u003c/li>\n\u003c/ul>\n\u003cp>Defer:\u003c/p>\n\u003cul>\n\u003cli>Complex outfit animation.\u003c/li>\n\u003cli>Object-specific bespoke animations for every prop.\u003c/li>\n\u003cli>Fully procedural body animation from imported photos.\u003c/li>\n\u003c/ul>\n\u003ch3>Character Pack Format\u003c/h3>\n\u003cp>A character pack should include:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>manifest.json\u003c/code>.\u003c/li>\n\u003cli>Sprite sheets.\u003c/li>\n\u003cli>Frame metadata.\u003c/li>\n\u003cli>Portrait/avatar image.\u003c/li>\n\u003cli>Color palette metadata.\u003c/li>\n\u003cli>Optional voice/sound references.\u003c/li>\n\u003c/ul>\n\u003cp>Recommended file layout:\u003c/p>\n\u003cpre>\u003ccode>characters/\n  default_pet/\n    manifest.json\n    default_pet_sheet.png\n    default_pet.aseprite\n    preview.png\u003c/code>\u003c/pre>\n\u003ch3>Photo To Pixel Workflow\u003c/h3>\n\u003cp>MVP workflow:\u003c/p>\n\u003cp>1. Import image.\u003c/p>\n\u003cp>2. Sample the face/subject area locally for palette and simple visual hints.\u003c/p>\n\u003cp>3. Apply the built-in Q-version pixel character template.\u003c/p>\n\u003cp>4. Fill template regions with controlled palette choices.\u003c/p>\n\u003cp>5. Generate a 48x64 template character preview.\u003c/p>\n\u003cp>6. Save the generated character as a local custom character pack.\u003c/p>\n\u003cp>7. Allow manual confirmation.\u003c/p>\n\u003cp>Advanced workflow:\u003c/p>\n\u003cp>1. Use ComfyUI for Q-version character generation.\u003c/p>\n\u003cp>2. Apply pixel-art LoRA or postprocess pixelization.\u003c/p>\n\u003cp>3. Generate sprite reference.\u003c/p>\n\u003cp>4. Human QA and cleanup.\u003c/p>\n\u003cp>5. Convert into character pack.\u003c/p>\n\u003ch3>MVP Photo Generation Boundary\u003c/h3>\n\u003cp>The first version should market this as a pixel avatar or inspiration generator, not as exact identity replication.\u003c/p>\n\u003cp>Keep:\u003c/p>\n\u003cul>\n\u003cli>Face/subject crop.\u003c/li>\n\u003cli>Palette extraction.\u003c/li>\n\u003cli>Hair/skin/clothing color hints.\u003c/li>\n\u003cli>Template body selection.\u003c/li>\n\u003cli>Idle preview generation.\u003c/li>\n\u003cli>Manual crop adjustment.\u003c/li>\n\u003c/ul>\n\u003cp>Avoid in MVP:\u003c/p>\n\u003cul>\n\u003cli>Using the raw imported photo as the final desktop pet body.\u003c/li>\n\u003cli>Treating the default seal as the photo-generation target.\u003c/li>\n\u003cli>Full-body reconstruction.\u003c/li>\n\u003cli>Frame-by-frame generated animation.\u003c/li>\n\u003cli>Celebrity or third-party IP prompts.\u003c/li>\n\u003cli>Promising exact likeness.\u003c/li>\n\u003cli>Requiring ComfyUI for ordinary users.\u003c/li>\n\u003c/ul>\n\u003ch3>Template Character Generator\u003c/h3>\n\u003cp>M4 uses a deterministic built-in generator before any AI model is introduced.\u003c/p>\n\u003cp>The generator owns:\u003c/p>\n\u003cul>\n\u003cli>The final 48x64 Q-version silhouette.\u003c/li>\n\u003cli>Outline thickness and readable body proportions.\u003c/li>\n\u003cli>Eye, cheek, limb, shadow, and idle-preview placement.\u003c/li>\n\u003cli>Palette constraints and quantization.\u003c/li>\n\u003c/ul>\n\u003cp>The imported photo owns only:\u003c/p>\n\u003cul>\n\u003cli>Palette/accent hints.\u003c/li>\n\u003cli>Future crop/subject hints.\u003c/li>\n\u003cli>Future optional identity hints after stronger local processing exists.\u003c/li>\n\u003c/ul>\n\u003cp>The default white seal is a first-party character pack and placeholder runtime mascot. It is not the target template for user photo generation.\u003c/p>\n\u003ch3>Pixel Proportion Lock\u003c/h3>\n\u003cp>Before any new hover UI, chat box, or care prop UI is implemented, the Art Director must lock the shared pixel proportion system.\u003c/p>\n\u003cp>Required decisions:\u003c/p>\n\u003cul>\n\u003cli>Character logical frame size.\u003c/li>\n\u003cli>Runtime display scale.\u003c/li>\n\u003cli>Status UI grid unit.\u003c/li>\n\u003cli>Border thickness.\u003c/li>\n\u003cli>Icon size for health, mood, hunger, and money.\u003c/li>\n\u003cli>Chat box width, line height, input height, and padding.\u003c/li>\n\u003cli>Prop scale relative to pet height.\u003c/li>\n\u003c/ul>\n\u003cp>Do not generate or implement a Meowa UI kit before this scale is locked.\u003c/p>\n\u003ch3>Meowa Pixel UI Kit\u003c/h3>\n\u003cp>After the pixel proportion lock, Meowa should be used to generate a UI kit that matches the desktop pet scale. Prompts must be written or approved by the unified Art Director.\u003c/p>\n\u003cp>Minimum UI kit:\u003c/p>\n\u003cul>\n\u003cli>Hover status frame.\u003c/li>\n\u003cli>Health icon/bar.\u003c/li>\n\u003cli>Mood icon/bar.\u003c/li>\n\u003cli>Hunger icon/bar.\u003c/li>\n\u003cli>Money icon/counter.\u003c/li>\n\u003cli>Double-click chat box frame.\u003c/li>\n\u003cli>Chat input area.\u003c/li>\n\u003cli>Food, toy, and bed icons.\u003c/li>\n\u003c/ul>\n\u003cp>Every UI kit pass must include screenshot QA before implementation acceptance.\u003c/p>\n\u003ch3>Meowa Prompt Ownership\u003c/h3>\n\u003cp>Meowa is treated as an art production tool, not a free-form implementation shortcut. A unified Art Director owns the prompt language, negative prompts, style consistency, and batch acceptance criteria. Engineers may execute the approved prompts and convert the selected output into runtime assets, but they do not change the art direction independently.\u003c/p>\n\u003cp>Every Meowa batch must record remaining credit after generation.\u003c/p>\n\u003ch3>AI Integration\u003c/h3>\n\u003cp>Use local AI for:\u003c/p>\n\u003cul>\n\u003cli>Short pet replies.\u003c/li>\n\u003cli>Personality-based reactions.\u003c/li>\n\u003cli>Optional Q&amp;A.\u003c/li>\n\u003cli>Event flavor text.\u003c/li>\n\u003c/ul>\n\u003cp>Do not depend on AI for:\u003c/p>\n\u003cul>\n\u003cli>Core state transitions.\u003c/li>\n\u003cli>Save data correctness.\u003c/li>\n\u003cli>Critical UI flows.\u003c/li>\n\u003cli>Deterministic gameplay rules.\u003c/li>\n\u003c/ul>\n\u003ch3>Licensing Notes\u003c/h3>\n\u003cp>Check licenses for:\u003c/p>\n\u003cul>\n\u003cli>Model weights.\u003c/li>\n\u003cli>LoRA files.\u003c/li>\n\u003cli>Generated image commercial terms.\u003c/li>\n\u003cli>Pixel fonts.\u003c/li>\n\u003cli>Sound effects.\u003c/li>\n\u003cli>UI icons.\u003c/li>\n\u003cli>Any imported open-source desktop pet code.\u003c/li>\n\u003c/ul>\n\u003cp>Generated assets should still receive manual review before being included in the personal build.\u003c/p>\n\u003ch3>Public Release Visual Assets\u003c/h3>\n\u003cp>Public release visual assets are no longer active scope. If public distribution is revived later, create a separate release art checklist at that time.\u003c/p>"}]}],"artAssets":[{"id":"planned/props/bed.png","name":"Bed prop","category":"场景/道具","status":"未制作","path":"planned/props/bed.png","updatedAt":null,"notes":""},{"id":"planned/props/food.png","name":"Food prop","category":"场景/道具","status":"未制作","path":"planned/props/food.png","updatedAt":null,"notes":""},{"id":"planned/props/toy.png","name":"Toy prop","category":"场景/道具","status":"未制作","path":"planned/props/toy.png","updatedAt":null,"notes":""},{"id":"planned/states/hungry.png","name":"Hungry state art","category":"角色动作帧","status":"未制作","path":"planned/states/hungry.png","updatedAt":null,"notes":""},{"id":"planned/states/low-health.png","name":"Low health/sick state art","category":"角色动作帧","status":"未制作","path":"planned/states/low-health.png","updatedAt":null,"notes":""},{"id":"assets/characters/photo_001_travel_girl/animation-previews/happy.gif","name":"happy.gif","category":"角色动作GIF","status":"占位资源","path":"assets/characters/photo_001_travel_girl/animation-previews/happy.gif","updatedAt":"2026-07-08T15:31:49.902Z","notes":""},{"id":"assets/characters/photo_001_travel_girl/animation-previews/idle.gif","name":"idle.gif","category":"角色动作GIF","status":"占位资源","path":"assets/characters/photo_001_travel_girl/animation-previews/idle.gif","updatedAt":"2026-07-08T15:31:49.890Z","notes":""},{"id":"assets/characters/photo_001_travel_girl/animation-previews/sleep.gif","name":"sleep.gif","category":"角色动作GIF","status":"占位资源","path":"assets/characters/photo_001_travel_gir path":"planned/ui/hunger-icon-or-bar.png","updatedAt":null,"notes":""},{"id":"planned/ui/money-icon-or-counter.png","name":"Money icon/counter","category":"UI套件","status":"未制作","path":"planned/ui/money-icon-or-counter.png","updatedAt":null,"notes":""},{"id":"planned/ui/mood-icon-or-bar.png","name":"Mood icon/bar","category":"UI套件","status":"未制作","path":"planned/ui/mood-icon-or-bar.png","updatedAt":null,"notes":""}],"milestones":[{"milestone":"M0 Product Lock","status":"Complete / superseded","notes":"Original Steam/USD assumptions replaced by personal-use direction"},{"milestone":"M1 Desktop Shell","status":"Complete","notes":"Transparent draggable Electron shell established"},{"milestone":"M2 Pet Runtime","status":"Complete","notes":"State machine, drag/poke, cross-screen safety, and runtime save behavior established"},{"milestone":"M3 Character Packs","status":"Complete","notes":"Manifest-driven character packs and fallback behavior established"},{"milestone":"M4 Photo Commission Pipeline","status":"Complete","notes":"Owner-directed commissioned character packs established"},{"milestone":"M5 Character Animation MVP","status":"Complete pending owner acceptance","notes":"Meowa-assisted animation frames and screenshot QA"},{"milestone":"M6 Personal Care + Hover UI","status":"Not started","notes":"Next recommended milestone"},{"milestone":"M7 WeChat Persona Chat Slice","status":"Not started","notes":"Follows M6"},{"milestone":"M8 Personal Build Polish","status":"Not started","notes":"Local stability and data hygiene"}],"pmActions":[{"area":"M6","item":"锁定桌宠和 UI 像素比例","owner":"美术总监 + 主负责人","status":"Next","gate":"比例表写入 GDD/PRD，截图验证 UI 不压角色"},{"area":"M6","item":"实现 health / mood / hunger / money 四数值","owner":"Planning + Client","status":"Not started","gate":"hover 面板和存档都能读写四个值"},{"area":"M6","item":"hover 才显示状态 UI","owner":"Client","status":"Not started","gate":"默认只显示桌宠；鼠标移入显示状态，移出隐藏"},{"area":"M6","item":"由美术总监输出 Meowa UI 套件提示词","owner":"Art Director","status":"Not started","gate":"先看 UI kit 预览，再实装，必须截图 QA"},{"area":"M7","item":"双击打开对话框","owner":"Client + AI","status":"Planned","gate":"对话框不影响拖拽/动画，可关闭，可截图 QA"},{"area":"M7","item":"微信聊天记录导入方案和隐私边界","owner":"AI + PM","status":"Planned","gate":"raw chat ignored/local-only，明确测试夹具策略"}],"decisionLog":[["2026-07-08","取消 Steam 发售目标，改为个人使用。"],["2026-07-08","产品对标 QQ 宠物式系统，核心值改为健康、情绪、饥饿、金钱。"],["2026-07-08","默认只显示桌宠，hover 才显示状态 UI。"],["2026-07-08","双击桌宠打开对话框，后续支持微信聊天记录本地蒸馏语气。"],["2026-07-08","所有美术未被确认最终上线品质前，都按占位资源管理。"],["2026-07-08","HTML dashboard 成为项目管理核心入口，文档/美术变化后必须 regenerate。"]],"riskRegister":[{"risk":"微信聊天记录涉及高度隐私","impact":"High","mitigation":"raw export 放 ignored 本地目录；仅提交脱敏 fixture；外部模型调用必须单独确认。"},{"risk":"像素 UI 与桌宠比例不统一","impact":"High","mitigation":"先锁定 pet/UI grid，再让美术总监出 Meowa prompt。"},{"risk":"美术资产质量未达上线标准","impact":"Medium","mitigation":"全部默认占位资源；正式资源只能由 owner 确认。"},{"risk":"dashboard 不是实时应用","impact":"Medium","mitigation":"项目规则要求变更后运行 npm.cmd run dashboard 并提交 push。"},{"risk":"本地语气模拟不像或越界","impact":"Medium","mitigation":"先做风格摘要和安全边界，避免声明真实身份复刻。"}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('dashboard-data').textContent);
const STATUSES = ['未制作', '占位资源', '正式资源'];
const statusClass = (s) => s === '正式资源' ? 'final' : s === '占位资源' ? 'placeholder' : 'todo';
const storageKey = 'project-seal-art-status-overrides';
let overrides = JSON.parse(localStorage.getItem(storageKey) || '{}');
function saveOverrides() { localStorage.setItem(storageKey, JSON.stringify(overrides)); }
function currentStatus(asset) { return overrides[asset.id]?.status || asset.status; }
function currentNotes(asset) { return overrides[asset.id]?.notes ?? asset.notes ?? ''; }
function escapeAttr(value) { return String(value).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function isPreviewableAsset(asset) { return /.(png|jpg|jpeg|gif|webp)$/i.test(asset.path) && !asset.path.startsWith('planned/'); }
function isRealFileAsset(asset) { return !asset.path.startsWith('planned/'); }
function assetHref(asset) { return encodeURI('../../' + asset.path).replace(/#/g, '%23'); }
function setActive(id) {
  document.querySelectorAll('.tab').forEach((el) => el.classList.toggle('active', el.dataset.id === id));
  document.querySelectorAll('.view').forEach((el) => el.classList.toggle('active', el.id === 'view-' + id));
}
function renderTabs(tabs) {
  const tabEl = document.getElementById('tabs');
  tabEl.innerHTML = tabs.map((tab) => '<button class="tab" data-id="' + tab.id + '">' + tab.label + '</button>').join('');
  tabEl.querySelectorAll('.tab').forEach((btn) => btn.addEventListener('click', () => setActive(btn.dataset.id)));
}
function renderDocs(group) {
  return '<section class="view" id="view-' + group.id + '">' + group.docs.map((doc) => '<article class="card"><div class="doc-head"><strong>' + doc.file + '</strong><span class="doc-path">更新: ' + (doc.updatedAt || 'missing') + '</span></div>' + doc.html + '</article>').join('') + '</section>';
}
function renderDashboard() {
  const counts = DATA.artAssets.reduce((acc, asset) => { const s = currentStatus(asset); acc[s] = (acc[s] || 0) + 1; return acc; }, {});
  const current = DATA.milestones.find((m) => /Not started/.test(m.status)) || DATA.milestones[DATA.milestones.length - 1];
  const milestoneRows = DATA.milestones.map((m) => '<tr><td>' + m.milestone + '</td><td>' + m.status + '</td><td>' + m.notes + '</td></tr>').join('');
  return '<section class="view" id="view-dashboard"><div class="grid"><div class="metric"><div class="num">' + DATA.milestones.length + '</div><div class="label">Milestones</div></div><div class="metric"><div class="num">' + DATA.artAssets.length + '</div><div class="label">Art assets tracked</div></div><div class="metric"><div class="num">' + (counts['占位资源'] || 0) + '</div><div class="label">占位资源</div></div><div class="metric"><div class="num">' + (counts['未制作'] || 0) + '</div><div class="label">未制作</div></div></div><article class="card"><h2>PM 摘要</h2><div class="table-wrap"><table><tbody><tr><th>当前产品方向</th><td>个人使用 Windows 桌宠，对标 QQ 宠物系统，不再以 Steam 发售为目标。</td></tr><tr><th>当前关键状态</th><td>M5 已完成，M6 Personal Care + Hover UI 是下一阶段。</td></tr><tr><th>下一步焦点</th><td>' + current.milestone + '：' + current.notes + '</td></tr><tr><th>交付规则</th><td>HTML dashboard 是项目管理核心入口；文档/资产变化后必须重新生成、截图 QA、commit + push。</td></tr></tbody></table></div></article><article class="card"><h2>当前里程碑状态</h2><div class="table-wrap"><table><thead><tr><th>Milestone</th><th>Status</th><th>Notes</th></tr></thead><tbody>' + milestoneRows + '</tbody></table></div></article></section>';
}
function renderPmDesk() {
  const actions = DATA.pmActions.map((a) => '<tr><td>' + a.area + '</td><td>' + a.item + '</td><td>' + a.owner + '</td><td><span class="badge">' + a.status + '</span></td><td>' + a.gate + '</td></tr>').join('');
  const decisions = DATA.decisionLog.map((d) => '<tr><td>' + d[0] + '</td><td>' + d[1] + '</td></tr>').join('');
  const risks = DATA.riskRegister.map((r) => '<tr><td>' + r.risk + '</td><td><span class="badge ' + r.impact.toLowerCase() + '">' + r.impact + '</span></td><td>' + r.mitigation + '</td></tr>').join('');
  return '<section class="view" id="view-pm"><article class="card"><h2>PM 工作台：下一步行动</h2><div class="table-wrap"><table><thead><tr><th>阶段</th><th>事项</th><th>负责人</th><th>状态</th><th>验收门槛</th></tr></thead><tbody>' + actions + '</tbody></table></div></article><article class="card"><h2>决策记录</h2><div class="table-wrap"><table><thead><tr><th>日期</th><th>决策</th></tr></thead><tbody>' + decisions + '</tbody></table></div></article><article class="card"><h2>风险登记</h2><div class="table-wrap"><table><thead><tr><th>风险</th><th>影响</th><th>缓解方案</th></tr></thead><tbody>' + risks + '</tbody></table></div></article></section>';
}
function renderAssets() {
  const categories = [...new Set(DATA.artAssets.map((a) => a.category))].sort((a, b) => a.localeCompare(b, 'zh-Hans-CN'));
  const options = ['全部', ...categories].map((c) => '<option value="' + c + '">' + c + '</option>').join('');
  return '<section class="view" id="view-art-assets"><article class="card"><h2>美术资产台账</h2><p class="note">动作帧在本表中以 GIF 预览资产展示，不再把每一帧 PNG 散列出来。资产名和路径可点击打开源文件；图片类资产直接显示缩略图。状态选项固定为：未制作、占位资源、正式资源。</p><div class="filterbar"><input id="asset-search" placeholder="搜索资产/路径"><select id="asset-category">' + options + '</select><select id="asset-status"><option>全部状态</option>' + STATUSES.map((s) => '<option>' + s + '</option>').join('') + '</select><button id="export-status">导出状态 JSON</button><button id="reset-status">重置本地选择</button></div><div class="table-wrap"><table><thead><tr><th>分类</th><th>资产 / 预览</th><th>状态</th><th>路径</th><th>备注</th><th>更新时间</th></tr></thead><tbody id="asset-rows"></tbody></table></div></article></section>';
}
function bindAssets() {
  const rows = document.getElementById('asset-rows');
  if (!rows) return;
  const search = document.getElementById('asset-search');
  const category = document.getElementById('asset-category');
  const status = document.getElementById('asset-status');
  function draw() {
    const q = search.value.trim().toLowerCase();
    const cat = category.value;
    const st = status.value;
    const filtered = DATA.artAssets.filter((asset) => {
      const s = currentStatus(asset);
      return (!q || asset.name.toLowerCase().includes(q) || asset.path.toLowerCase().includes(q)) && (cat === '全部' || asset.category === cat) && (st === '全部状态' || s === st);
    });
    rows.innerHTML = filtered.map((asset) => {
      const s = currentStatus(asset);
      const select = '<select data-id="' + asset.id + '" class="asset-status"><option ' + (s === '未制作' ? 'selected' : '') + '>未制作</option><option ' + (s === '占位资源' ? 'selected' : '') + '>占位资源</option><option ' + (s === '正式资源' ? 'selected' : '') + '>正式资源</option></select>';
      const href = isRealFileAsset(asset) ? assetHref(asset) : '';
      const thumb = isPreviewableAsset(asset)
        ? '<a href="' + href + '" target="_blank"><img class="asset-thumb" src="' + href + '" alt="' + escapeAttr(asset.name) + '"></a>'
        : '<div class="asset-thumb missing">' + (asset.path.startsWith('planned/') ? '未制作' : '文件') + '</div>';
      const name = isRealFileAsset(asset)
        ? '<a class="asset-link" href="' + href + '" target="_blank"><strong>' + asset.name + '</strong></a>'
        : '<strong>' + asset.name + '</strong>';
      const pathCell = isRealFileAsset(asset)
        ? '<a class="asset-link asset-path" href="' + href + '" target="_blank">' + asset.path + '</a>'
        : '<div class="asset-path">' + asset.path + '</div>';
      return '<tr><td>' + asset.category + '</td><td><div class="asset-cell">' + thumb + '<div class="asset-name-text">' + name + '</div></div></td><td><span class="status ' + statusClass(s) + '">' + select + '</span></td><td>' + pathCell + '</td><td><input data-note-id="' + asset.id + '" value="' + escapeAttr(currentNotes(asset) || '') + '" placeholder="备注"></td><td>' + (asset.updatedAt || '未制作') + '</td></tr>';
    }).join('');
    rows.querySelectorAll('.asset-status').forEach((el) => el.addEventListener('change', () => {
      overrides[el.dataset.id] = { ...(overrides[el.dataset.id] || {}), status: el.value };
      saveOverrides();
      draw();
    }));
    rows.querySelectorAll('[data-note-id]').forEach((el) => el.addEventListener('change', () => {
      overrides[el.dataset.noteId] = { ...(overrides[el.dataset.noteId] || {}), notes: el.value };
      saveOverrides();
    }));
  }
  [search, category, status].forEach((el) => el.addEventListener('input', draw));
  document.getElementById('export-status').addEventListener('click', () => {
    const merged = DATA.artAssets.map((asset) => ({ ...asset, status: currentStatus(asset), notes: currentNotes(asset) }));
    const blob = new Blob([JSON.stringify({ version: 1, exportedAt: new Date().toISOString(), assets: merged }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'art-assets-status.export.json';
    a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('reset-status').addEventListener('click', () => { overrides = {}; saveOverrides(); draw(); });
  draw();
}
function init() {
  const tabs = [{ id: 'dashboard', label: 'Dashboard' }, { id: 'pm', label: 'PM工作台' }, ...DATA.docs.map((g) => ({ id: g.id, label: g.label })), { id: 'art-assets', label: '美术资产' }];
  renderTabs(tabs);
  document.getElementById('views').innerHTML = renderDashboard() + renderPmDesk() + DATA.docs.map(renderDocs).join('') + renderAssets();
  bindAssets();
  setActive('dashboard');
}
init();
</script>
